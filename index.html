                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                            <p class="text-gray-600 text-sm">Klik atau drag file ke sini</p>
                            <p class="text-xs text-gray-400">Format: PDF, JPG, PNG. Maks: 2MB</p>
                            <input type="file" id="pbBukti" class="hidden" accept=".pdf,.jpg,.jpeg,.png" onchange="previewBuktiBank(this)">
                        </div>
                        <div id="previewBukti" class="hidden mt-2 text-sm text-blue-600"></div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="submitPemberkasanPip()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl text-sm font-medium"><i class="fas fa-paper-plane mr-2"></i>Submit Pemberkasan</button>
                    <button onclick="submitAllPemberkasanPip()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-xl text-sm font-medium" ${belumBerkas === 0 ? 'disabled' : ''}><i class="fas fa-check-double mr-2"></i>Submit Semua (${belumBerkas} siswa)</button>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <div class="px-6 py-4 bg-gray-50 border-b flex items-center justify-between">
                    <h3 class="font-semibold">Daftar Pemberkasan yang Sudah Disubmit</h3>
                    <button onclick="downloadRekapPemberkasanPip()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-sm font-medium"><i class="fas fa-file-excel mr-2"></i>Unduh Rekap</button>
                </div>
                <table class="w-full text-sm">
                    <thead><tr class="bg-gray-50">
                        <th class="p-4 text-left">No</th>
                        <th class="p-4 text-left">NISN</th>
                        <th class="p-4 text-left">Nama Siswa</th>
                        <th class="p-4 text-center">Status Berkas</th>
                        <th class="p-4 text-center">Tanggal Pemberkasan</th>
                        <th class="p-4 text-center">Bukti Bank</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr></thead>
                    <tbody>
                        ${pemberkasan.length === 0 ? '<tr><td colspan="7" class="p-8 text-center text-gray-500">Belum ada data pemberkasan. Silakan submit pemberkasan untuk siswa yang telah diverifikasi.</td></tr>' :
                        pemberkasan.map((p, i) => `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="p-4">${i+1}</td>
                                <td class="p-4 font-mono">${p.nisn}</td>
                                <td class="p-4 font-medium">${escapeHtml(p.nama)}</td>
                                <td class="p-4 text-center">
                                    <span class="px-2 py-1 ${p.statusBerkas === 'lengkap' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'} rounded-lg text-xs">${p.statusBerkas === 'lengkap' ? 'Lengkap' : 'Belum Lengkap'}</span>
                                </td>
                                <td class="p-4 text-center">${p.tanggalBerkas}</td>
                                <td class="p-4 text-center">
                                    ${p.buktiBank ? `<span class="text-blue-600 text-xs cursor-pointer hover:underline" onclick="viewBuktiBank('${p.buktiBank}')"><i class="fas fa-file-pdf mr-1"></i>${p.buktiBank}</span>` : '-'}
                                </td>
                                <td class="p-4 text-center">
                                    <button onclick="editPemberkasanPip(${p.id})" class="text-yellow-500 hover:text-yellow-700 mr-2" title="Edit"><i class="fas fa-edit"></i></button>
                                    <button onclick="hapusPemberkasanPip(${p.id})" class="text-red-500 hover:text-red-700" title="Hapus"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    
    // Auto-fill nama when NISN is entered
    setTimeout(() => {
        const nisnInput = document.getElementById('pbNisn');
        if (nisnInput) {
            nisnInput.addEventListener('input', function() {
                const nisn = this.value;
                const verval = vervalTerverifikasi.find(v => v.nisn === nisn);
                if (verval) {
                    document.getElementById('pbNama').value = verval.nama;
                }
            });
        }
    }, 100);
}

function previewBuktiBank(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        document.getElementById('previewBukti').classList.remove('hidden');
        document.getElementById('previewBukti').innerHTML = `<i class="fas fa-file mr-1"></i>${file.name}`;
    }
}

function submitPemberkasanPip() {
    const nisn = document.getElementById('pbNisn').value;
    const nama = document.getElementById('pbNama').value;
    const tanggal = document.getElementById('pbTanggal').value;
    const buktiInput = document.getElementById('pbBukti');
    
    if (!nisn || !nama || !tanggal) {
        showToast('Lengkapi semua field wajib!', 'error');
        return;
    }
    
    // Check if already submitted
    const existing = DB.pipPemberkasan.find(p => p.sekolahId === DB.currentSekolahId && p.nisn === nisn);
    if (existing) {
        showToast('Pemberkasan untuk NISN ini sudah ada!', 'warning');
        return;
    }
    
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const newId = DB.pipPemberkasan.length > 0 ? Math.max(...DB.pipPemberkasan.map(p => p.id)) + 1 : 1;
    
    DB.pipPemberkasan.push({
        id: newId,
        sekolahId: DB.currentSekolahId,
        sekolah: sekolah?.nama || '',
        nisn: nisn,
        nama: nama,
        statusBerkas: 'lengkap',
        tanggalBerkas: tanggal,
        buktiBank: buktiInput.files[0]?.name || 'bukti_transfer.pdf'
    });
    
    showToast('Pemberkasan berhasil disubmit!');
    document.getElementById('pbNisn').value = '';
    document.getElementById('pbNama').value = '';
    document.getElementById('pbTanggal').value = new Date().toISOString().split('T')[0];
    buktiInput.value = '';
    document.getElementById('previewBukti').classList.add('hidden');
    renderSPipPemberkasan();
}

function submitAllPemberkasanPip() {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const vervalTerverifikasi = DB.pipVerval.filter(v => v.sekolahId === DB.currentSekolahId && v.statusVerval === 'terverifikasi');
    const existingNisn = DB.pipPemberkasan.filter(p => p.sekolahId === DB.currentSekolahId).map(p => p.nisn);
    const belumBerkas = vervalTerverifikasi.filter(v => !existingNisn.includes(v.nisn));
    
    if (belumBerkas.length === 0) {
        showToast('Semua siswa sudah memiliki pemberkasan!', 'info');
        return;
    }
    
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-file-upload text-blue-600 text-2xl"></i></div>
                <h3 class="text-lg font-semibold">Submit Semua Pemberkasan</h3>
                <p class="text-sm text-gray-500 mt-1">${belumBerkas.length} siswa akan disubmit pemberkasannya</p>
            </div>
            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-4">
                <p class="text-sm text-yellow-700"><i class="fas fa-exclamation-triangle mr-2"></i>Bukti bank akan menggunakan nama file default. Anda dapat mengedit masing-masing siswa untuk mengupload bukti bank yang sebenarnya.</p>
            </div>
            <div class="max-h-60 overflow-y-auto mb-4">
                <p class="text-sm text-gray-600 mb-2">Daftar siswa:</p>
                <ul class="text-sm space-y-1">
                    ${belumBerkas.slice(0, 10).map(v => `<li class="text-gray-700">• ${v.nisn} - ${v.nama}</li>`).join('')}
                    ${belumBerkas.length > 10 ? `<li class="text-gray-500">... dan ${belumBerkas.length - 10} siswa lainnya</li>` : ''}
                </ul>
            </div>
            <div class="flex gap-3">
                <button onclick="doSubmitAllPemberkasan()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-medium">Submit Semua</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

function doSubmitAllPemberkasan() {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const vervalTerverifikasi = DB.pipVerval.filter(v => v.sekolahId === DB.currentSekolahId && v.statusVerval === 'terverifikasi');
    const existingNisn = DB.pipPemberkasan.filter(p => p.sekolahId === DB.currentSekolahId).map(p => p.nisn);
    const belumBerkas = vervalTerverifikasi.filter(v => !existingNisn.includes(v.nisn));
    
    let newId = DB.pipPemberkasan.length > 0 ? Math.max(...DB.pipPemberkasan.map(p => p.id)) + 1 : 1;
    const today = new Date().toISOString().split('T')[0];
    
    belumBerkas.forEach(v => {
        DB.pipPemberkasan.push({
            id: newId++,
            sekolahId: DB.currentSekolahId,
            sekolah: sekolah?.nama || '',
            nisn: v.nisn,
            nama: v.nama,
            statusBerkas: 'lengkap',
            tanggalBerkas: today,
            buktiBank: 'bukti_transfer_default.pdf'
        });
    });
    
    closeModal();
    showToast(`${belumBerkas.length} pemberkasan berhasil disubmit!`);
    renderSPipPemberkasan();
}

function downloadRekapPemberkasanPip() {
    const pemberkasan = DB.pipPemberkasan.filter(p => p.sekolahId === DB.currentSekolahId);
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    
    let csvContent = 'Rekap Pemberkasan PIP\n';
    csvContent += `Sekolah: ${sekolah?.nama || ''}\n`;
    csvContent += `Tanggal: ${new Date().toLocaleDateString('id-ID')}\n\n`;
    csvContent += 'No,NISN,Nama Siswa,Status Berkas,Tanggal Submit,Bukti Bank\n';
    
    pemberkasan.forEach((p, i) => {
        csvContent += `${i+1},${p.nisn},"${p.nama}",${p.statusBerkas},${p.tanggalBerkas},${p.buktiBank || '-'}\n`;
    });
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `rekap_pemberkasan_pip_${sekolah?.npsn || 'sekolah'}.csv`;
    link.click();
    
    showToast('Rekap pemberkasan berhasil diunduh!');
}

function viewBuktiBank(filename) {
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-20 h-20 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-file-pdf text-red-600 text-3xl"></i></div>
                <h3 class="text-lg font-semibold">Bukti Tanda Terima Bank</h3>
                <p class="text-sm text-gray-500">${filename}</p>
            </div>
            <div class="bg-gray-100 rounded-xl p-8 text-center">
                <i class="fas fa-file-image text-6xl text-gray-400 mb-4"></i>
                <p class="text-sm text-gray-500">Preview file tidak tersedia dalam mode demo.</p>
                <p class="text-xs text-gray-400 mt-2">Pada implementasi nyata, file akan ditampilkan di sini.</p>
            </div>
            <div class="flex gap-3 mt-4">
                <button onclick="downloadBuktiBank('${filename}')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-medium"><i class="fas fa-download mr-2"></i>Download</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Tutup</button>
            </div>
        </div>
    `);
}

function downloadBuktiBank(filename) {
    showToast(`Mengunduh ${filename}...`, 'info');
    closeModal();
}

function editPemberkasanPip(id) {
    const p = DB.pipPemberkasan.find(x => x.id === id);
    if (!p) return;
    
    showModal(`
        <div class="p-6">
            <h3 class="text-lg font-semibold mb-4"><i class="fas fa-edit text-yellow-500 mr-2"></i>Edit Pemberkasan PIP</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-600 mb-1 block">NISN</label>
                    <input type="text" id="editPbNisn" value="${p.nisn}" class="w-full border rounded-xl px-4 py-2.5 text-sm bg-gray-100" readonly>
                </div>
                <div>
                    <label class="text-sm text-gray-600 mb-1 block">Nama Siswa</label>
                    <input type="text" id="editPbNama" value="${escapeHtml(p.nama)}" class="w-full border rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="text-sm text-gray-600 mb-1 block">Tanggal Pemberkasan</label>
                    <input type="date" id="editPbTanggal" value="${p.tanggalBerkas}" class="w-full border rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="text-sm text-gray-600 mb-1 block">Status Berkas</label>
                    <select id="editPbStatus" class="w-full border rounded-xl px-4 py-2.5 text-sm">
                        <option value="lengkap" ${p.statusBerkas === 'lengkap' ? 'selected' : ''}>Lengkap</option>
                        <option value="belum_lengkap" ${p.statusBerkas === 'belum_lengkap' ? 'selected' : ''}>Belum Lengkap</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm text-gray-600 mb-1 block">Ganti Bukti Bank (opsional)</label>
                    <div class="file-upload-zone rounded-xl p-4 text-center cursor-pointer" onclick="document.getElementById('editPbBukti').click()">
                        <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i>
                        <p class="text-gray-600 text-sm">Klik untuk upload file baru</p>
                        <p class="text-xs text-gray-400">File saat ini: ${p.buktiBank || '-'}</p>
                        <input type="file" id="editPbBukti" class="hidden" accept=".pdf,.jpg,.jpeg,.png" onchange="document.getElementById('editPbBuktiName').textContent = this.files[0]?.name || ''">
                    </div>
                    <p id="editPbBuktiName" class="text-xs text-blue-600 mt-1"></p>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="doEditPemberkasanPip(${id})" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-medium">Update</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

function doEditPemberkasanPip(id) {
    const p = DB.pipPemberkasan.find(x => x.id === id);
    if (!p) return;
    
    const buktiInput = document.getElementById('editPbBukti');
    
    p.nama = document.getElementById('editPbNama').value;
    p.tanggalBerkas = document.getElementById('editPbTanggal').value;
    p.statusBerkas = document.getElementById('editPbStatus').value;
    if (buktiInput.files[0]) {
        p.buktiBank = buktiInput.files[0].name;
    }
    
    closeModal();
    showToast('Pemberkasan berhasil diupdate!');
    renderSPipPemberkasan();
}

function hapusPemberkasanPip(id) {
    const p = DB.pipPemberkasan.find(x => x.id === id);
    if (!p) return;
    
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-trash text-red-600 text-2xl"></i></div>
                <h3 class="text-lg font-semibold">Hapus Pemberkasan</h3>
                <p class="text-sm text-gray-500 mt-1">${p.nisn} - ${p.nama}</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
                <p class="text-sm text-red-700">Data pemberkasan akan dihapus permanen dan tidak dapat dikembalikan.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="doHapusPemberkasanPip(${id})" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-xl text-sm font-medium">Hapus</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

function doHapusPemberkasanPip(id) {
    const idx = DB.pipPemberkasan.findIndex(p => p.id === id);
    if (idx > -1) {
        DB.pipPemberkasan.splice(idx, 1);
        closeModal();
        showToast('Pemberkasan berhasil dihapus!');
        renderSPipPemberkasan();
    }
}

// ==================== INITIAL LOAD ====================
async function initializeApp() {
    // Show loading indicator
    const contentArea = document.getElementById('contentArea');
    if (contentArea) {
        contentArea.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-[400px]">
                <div class="loading-spinner" style="width: 40px; height: 40px;"></div>
                <p class="mt-4 text-gray-500">Memuat data...</p>
                <p class="text-xs text-gray-400 mt-2">Mencoba koneksi ke cloud...</p>
            </div>
        `;
    }
    
    // First, load from localStorage for immediate display
    const hasLocalData = loadFromLocalStorage();
    if (hasLocalData) {
        console.log('Using cached data from localStorage');
    }
    
    // Try to initialize Firebase with timeout
    const firebaseTimeout = new Promise((resolve) => {
        setTimeout(() => {
            console.log('Firebase init timeout, continuing with local data');
            resolve(null);
        }, 6000);
    });
    
    try {
        await Promise.race([initFirebase(), firebaseTimeout]);
    } catch (error) {
        console.error('Init error:', error);
    }
    
    // Show the public view regardless of Firebase status
    initPublicView();
    
    // Show connection status
    if (firebaseReady) {
        showToast('✓ Terhubung ke cloud', 'success');
    } else {
        showToast('⚡ Mode offline - perubahan tersimpan lokal', 'warning');
    }
}

initializeApp();
</script>
