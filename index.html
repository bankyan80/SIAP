<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAP - Sistem Informasi Administrasi Pendidikan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <!-- Firebase SDK v12.11.0 -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .fade-in { animation: fadeIn .4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .slide-in { animation: slideIn .3s ease; }
        @keyframes slideIn { from { transform:translateX(-20px); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
        .pulse-dot { animation: pulse-dot 2s infinite; }
        .sidebar-item { transition: all .2s; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255,255,255,.15); }
        #sidebar { transition: transform 0.3s ease, width 0.3s ease; }
        #sidebar.collapsed { transform: translateX(-100%); }
        main { transition: margin-left 0.3s ease; }
        main.expanded { margin-left: 0 !important; }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:25; }
        .sidebar-overlay.active { display:block; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.mobile-open { transform: translateX(0); }
            main { margin-left: 0 !important; }
        }
        .stat-card { position: relative; overflow: hidden; }
        .stat-card::before { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.1); }
        .has-submenu .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .has-submenu.open .submenu { max-height: 1000px; }
        .has-submenu .submenu-arrow { transition: transform 0.3s ease; }
        .has-submenu.open .submenu-arrow { transform: rotate(90deg); }
        .file-upload-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .file-upload-zone:hover, .file-upload-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
        .status-draft { background: #f3f4f6; color: #6b7280; }
        .status-diajukan { background: #dbeafe; color: #2563eb; }
        .status-diproses { background: #fef3c7; color: #d97706; }
        .status-disetujui { background: #d1fae5; color: #059669; }
        .status-ditolak { background: #fee2e2; color: #dc2626; }
        .toast { animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards; }
        @keyframes toastIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes toastOut { from{opacity:1} to{opacity:0} }
        .modal-overlay { background: rgba(0,0,0,.5); backdrop-filter: blur(4px); }
        .sync-pulse { animation: syncPulse 1.5s infinite; }
        @keyframes syncPulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)} 70%{box-shadow:0 0 0 10px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
        .badge-online { background: #22c55e; }
        .badge-offline { background: #ef4444; }
        .login-bg-modal { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
        .hero-gradient { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1e40af 100%); }
        .logo-img { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; background: white; padding: 2px; }
        .logo-img-large { width: 64px; height: 64px; object-fit: contain; background: white; padding: 4px; border-radius: 12px; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mega Mendung Batik Pattern */
        .mega-mendung-bg {
            position: relative;
            overflow: hidden;
        }
        .mega-mendung-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* Cloud layer 1 */
                radial-gradient(ellipse 80px 50px at 10% 20%, rgba(30, 58, 95, 0.4) 0%, transparent 70%),
                radial-gradient(ellipse 100px 60px at 30% 35%, rgba(37, 99, 235, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse 120px 70px at 50% 15%, rgba(30, 64, 175, 0.35) 0%, transparent 70%),
                radial-gradient(ellipse 90px 55px at 75% 25%, rgba(37, 99, 235, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse 110px 65px at 90% 40%, rgba(30, 58, 95, 0.3) 0%, transparent 70%),
                /* Cloud layer 2 */
                radial-gradient(ellipse 70px 45px at 15% 55%, rgba(30, 64, 175, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse 95px 55px at 40% 70%, rgba(37, 99, 235, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse 85px 50px at 65% 60%, rgba(30, 58, 95, 0.35) 0%, transparent 70%),
                radial-gradient(ellipse 105px 60px at 85% 75%, rgba(37, 99, 235, 0.3) 0%, transparent 70%),
                /* Cloud layer 3 */
                radial-gradient(ellipse 75px 45px at 5% 85%, rgba(30, 64, 175, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse 90px 55px at 55% 90%, rgba(37, 99, 235, 0.2) 0%, transparent 70%),
                radial-gradient(ellipse 80px 50px at 95% 95%, rgba(30, 58, 95, 0.3) 0%, transparent 70%),
                /* Accent clouds */
                radial-gradient(ellipse 60px 35px at 25% 45%, rgba(59, 130, 246, 0.2) 0%, transparent 70%),
                radial-gradient(ellipse 70px 40px at 70% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .mega-mendung-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* Wave patterns - typical of mega mendung */
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.02) 10px,
                    rgba(255, 255, 255, 0.02) 20px
                ),
                /* Decorative curves */
                radial-gradient(ellipse 150px 80px at 20% 10%, rgba(96, 165, 250, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 180px 90px at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 160px 85px at 40% 80%, rgba(96, 165, 250, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .mega-mendung-bg > * {
            position: relative;
            z-index: 1;
        }

        /* Sidebar Mega Mendung */
        .sidebar-mega-mendung {
            background: linear-gradient(180deg, #0f172a 0%, #1e3a5f 40%, #1e40af 70%, #1e3a5f 100%);
            position: relative;
            overflow: hidden;
        }
        .sidebar-mega-mendung::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* Traditional mega mendung cloud shapes */
                radial-gradient(ellipse 60px 35px at 10% 5%, rgba(96, 165, 250, 0.2) 0%, transparent 70%),
                radial-gradient(ellipse 80px 45px at 35% 8%, rgba(59, 130, 246, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 70px 40px at 60% 3%, rgba(96, 165, 250, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 90px 50px at 85% 10%, rgba(59, 130, 246, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 65px 38px at 20% 15%, rgba(96, 165, 250, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse 75px 42px at 50% 18%, rgba(59, 130, 246, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 85px 48px at 75% 12%, rgba(96, 165, 250, 0.13) 0%, transparent 70%),
                /* Middle clouds */
                radial-gradient(ellipse 55px 32px at 5% 35%, rgba(96, 165, 250, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 70px 40px at 30% 40%, rgba(59, 130, 246, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse 60px 35px at 55% 38%, rgba(96, 165, 250, 0.14) 0%, transparent 70%),
                radial-gradient(ellipse 80px 45px at 80% 42%, rgba(59, 130, 246, 0.11) 0%, transparent 70%),
                /* Lower clouds */
                radial-gradient(ellipse 50px 30px at 15% 60%, rgba(96, 165, 250, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse 65px 38px at 45% 65%, rgba(59, 130, 246, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 75px 42px at 70% 62%, rgba(96, 165, 250, 0.09) 0%, transparent 70%),
                radial-gradient(ellipse 60px 35px at 90% 68%, rgba(59, 130, 246, 0.13) 0%, transparent 70%),
                /* Bottom clouds */
                radial-gradient(ellipse 70px 40px at 10% 85%, rgba(96, 165, 250, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 85px 48px at 40% 90%, rgba(59, 130, 246, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse 65px 38px at 65% 88%, rgba(96, 165, 250, 0.11) 0%, transparent 70%),
                radial-gradient(ellipse 80px 45px at 90% 92%, rgba(59, 130, 246, 0.09) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .sidebar-mega-mendung::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* Subtle wave pattern overlay */
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 5px,
                    rgba(255, 255, 255, 0.01) 5px,
                    rgba(255, 255, 255, 0.01) 10px
                );
            pointer-events: none;
            z-index: 0;
        }
        .sidebar-mega-mendung > * {
            position: relative;
            z-index: 1;
        }

        /* Enhanced login modal with mega mendung */
        .login-mega-mendung {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 30%, #1e40af 60%, #1e3a5f 80%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }
        .login-mega-mendung::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* Large decorative clouds */
                radial-gradient(ellipse 200px 120px at -10% 10%, rgba(96, 165, 250, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse 250px 150px at 110% 20%, rgba(59, 130, 246, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 180px 100px at 50% -10%, rgba(96, 165, 250, 0.18) 0%, transparent 60%),
                /* Medium clouds */
                radial-gradient(ellipse 120px 70px at 20% 40%, rgba(59, 130, 246, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 140px 80px at 75% 50%, rgba(96, 165, 250, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 100px 60px at 45% 65%, rgba(59, 130, 246, 0.1) 0%, transparent 70%),
                /* Small accent clouds */
                radial-gradient(ellipse 80px 50px at 10% 80%, rgba(96, 165, 250, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 90px 55px at 90% 85%, rgba(59, 130, 246, 0.13) 0%, transparent 70%),
                radial-gradient(ellipse 70px 45px at 60% 90%, rgba(96, 165, 250, 0.1) 0%, transparent 70%),
                /* Traditional curvy cloud patterns */
                radial-gradient(ellipse 60px 35px at 30% 25%, rgba(147, 197, 253, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50px 30px at 65% 35%, rgba(147, 197, 253, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 55px 32px at 35% 75%, rgba(147, 197, 253, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 65px 38px at 70% 70%, rgba(147, 197, 253, 0.13) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .login-mega-mendung::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* Subtle shimmer effect */
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 15px,
                    rgba(255, 255, 255, 0.015) 15px,
                    rgba(255, 255, 255, 0.015) 30px
                ),
                /* Golden accent - typical of premium batik */
                radial-gradient(ellipse 100px 60px at 85% 15%, rgba(251, 191, 36, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 80px 50px at 15% 90%, rgba(251, 191, 36, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .login-mega-mendung > * {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="bg-gray-50">

<!-- MAIN APP -->
<div id="mainApp" class="min-h-screen flex">
    <div id="sidebarOverlay" class="sidebar-overlay no-print" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 sidebar-mega-mendung text-white flex flex-col fixed h-full z-30 no-print">
        <div class="p-5 border-b border-white/10">
            <div class="flex items-center gap-3">
                <img src="https://i.pinimg.com/1200x/76/39/2d/76392d91c9c22d8ec5563b1126cd55b8.jpg" alt="Logo" class="logo-img">
                <div class="flex-1">
                    <h1 class="font-bold text-lg leading-tight">SIAP</h1>
                    <p id="sidebarRole" class="text-xs text-blue-300">Portal Publik</p>
                </div>
                <button onclick="toggleSidebar()" class="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center transition text-white/70 hover:text-white" title="Tutup">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>
        </div>
        <div class="p-3 border-b border-white/10" id="userInfoSection" style="display:none;">
            <div class="flex items-center gap-3 p-2 rounded-xl bg-white/5">
                <div class="w-9 h-9 bg-blue-500 rounded-lg flex items-center justify-center text-sm font-bold" id="userAvatar">A</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium truncate" id="userName">Admin</p>
                    <p class="text-xs text-gray-400 truncate" id="userRole">Administrator</p>
                </div>
            </div>
        </div>
        <nav id="sidebarNav" class="flex-1 p-3 overflow-y-auto space-y-1"></nav>
        <div class="p-3 border-t border-white/10" id="sidebarBottom"></div>
    </aside>

    <main class="flex-1 ml-64">
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20 no-print">
            <div class="flex items-center gap-3">
                <button id="sidebarOpenBtn" onclick="toggleSidebar()" class="hidden w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition">
                    <i class="fas fa-bars text-gray-600"></i>
                </button>
                <div>
                    <h2 id="pageTitle" class="text-lg font-semibold text-gray-800">Dashboard Publik</h2>
                    <p id="pageSubtitle" class="text-xs text-gray-500">Sistem Informasi Administrasi Pendidikan</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="syncStatus" class="hidden items-center gap-2 px-3 py-1.5 bg-green-50 border border-green-200 rounded-full text-xs text-green-700">
                    <span class="w-2 h-2 rounded-full badge-online pulse-dot"></span>
                    <span>Tersinkronisasi</span>
                </div>
                <div class="relative" id="notifBtnWrap" style="display:none;">
                    <button onclick="toggleNotif()" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center relative transition">
                        <i class="fas fa-bell text-gray-600"></i>
                        <span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center" id="notifCount">0</span>
                    </button>
                    <div id="notifDrop" class="hidden absolute right-0 top-12 w-80 bg-white rounded-xl shadow-xl border z-50">
                        <div class="p-4 border-b font-semibold text-sm">Notifikasi</div>
                        <div class="max-h-60 overflow-y-auto" id="notifList"></div>
                    </div>
                </div>
                <button id="topLoginBtn" onclick="showLoginModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition shadow-sm">
                    <i class="fas fa-sign-in-alt"></i><span>Masuk</span>
                </button>
                <div class="text-right">
                    <p class="text-sm font-medium text-gray-700" id="topDate"></p>
                    <p class="text-xs text-gray-400" id="topTime"></p>
                </div>
            </div>
        </header>
        <div id="contentArea" class="p-6"></div>
    </main>
</div>

<div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

<div id="modalOverlay" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
    <div id="modalContent" class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto fade-in"></div>
</div>

<div id="loginModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeLoginModal()"></div>
    <div class="relative w-full max-w-md fade-in z-10">
        <div class="login-mega-mendung rounded-2xl p-8 shadow-2xl border border-white/10">
            <div class="text-center mb-6">
                <img src="https://i.pinimg.com/1200x/76/39/2d/76392d91c9c22d8ec5563b1126cd55b8.jpg" alt="Logo" class="logo-img-large mx-auto mb-3">
                <h2 class="text-xl font-bold text-white">Masuk ke SIAP</h2>
                <p class="text-blue-200 text-sm mt-1">Sistem Informasi Administrasi Pendidikan</p>
            </div>
            <button onclick="closeLoginModal()" class="absolute top-4 right-4 w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center text-white/70 hover:text-white transition">
                <i class="fas fa-times"></i>
            </button>
            
            <!-- Tab Login/Register -->
            <div class="flex mb-4 bg-white/10 rounded-xl p-1">
                <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 rounded-lg text-sm font-medium text-white bg-white/20 transition">Masuk</button>
                <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 rounded-lg text-sm font-medium text-blue-200 hover:text-white transition">Daftar</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="space-y-4">
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
                        <input id="loginEmail" type="email" placeholder="Masukkan email" class="w-full bg-white/10 border border-white/20 text-white rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-blue-300/50">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
                        <input id="loginPassword" type="password" placeholder="Masukkan password" class="w-full bg-white/10 border border-white/20 text-white rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-blue-300/50" onkeypress="if(event.key==='Enter')doLogin()">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <label class="flex items-center gap-2 text-sm text-blue-200">
                        <input type="checkbox" id="rememberMe" class="rounded">
                        Ingat saya
                    </label>
                    <button onclick="showResetPassword()" class="text-sm text-blue-300 hover:text-white transition">Lupa password?</button>
                </div>
                <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-blue-600/30">
                    <i class="fas fa-sign-in-alt mr-2"></i>Masuk
                </button>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="hidden space-y-4">
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Nama Lengkap</label>
                    <input id="regNama" type="text" placeholder="Nama lengkap" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-blue-300/50">
                </div>
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Email</label>
                    <input id="regEmail" type="email" placeholder="Masukkan email" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-blue-300/50">
                </div>
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Password (min. 6 karakter)</label>
                    <input id="regPassword" type="password" placeholder="Buat password" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-blue-300/50">
                </div>
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Konfirmasi Password</label>
                    <input id="regPasswordConfirm" type="password" placeholder="Ulangi password" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-blue-300/50">
                </div>
                <div>
                    <label class="text-sm text-blue-200 mb-1.5 block">Tipe Akun</label>
                    <select id="regRole" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="sekolah" class="text-gray-800">Admin Sekolah</option>
                    </select>
                </div>
                <div id="regSekolahSelect" class="hidden">
                    <label class="text-sm text-blue-200 mb-1.5 block">Pilih Sekolah</label>
                    <select id="regSekolahId" class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <button onclick="doRegister()" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-green-600/30">
                    <i class="fas fa-user-plus mr-2"></i>Daftar
                </button>
            </div>

// Initialize Firebase
let db = null;
let auth = null;
let firebaseReady = false;
let currentUserData = null;

async function initFirebase() {
    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
            
            // Test connection with timeout
            console.log('Testing Firebase connection...');
            
            const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error('Connection timeout')), 5000);
            });
            
            const testConnection = db.collection('_test').limit(1).get();
            
            await Promise.race([testConnection, timeoutPromise]);
            
            firebaseReady = true;
            console.log('Firebase connected successfully');
            
            // Listen for auth state changes
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('User signed in:', user.email);
                    // Load user data from Firestore
                    await loadUserData(user);
                } else {
                    console.log('User signed out');
                    currentUserData = null;
                    DB.currentUser = null;
                    DB.currentRole = null;
                    DB.isLoggedIn = false;
                }
            });
            
            // Load all data from Firestore
            await loadAllDataFromFirestore();
            
        }
    } catch (error) {
        console.error('Firebase connection error:', error);
        firebaseReady = false;
        showToast('Mode offline aktif - data tersimpan lokal saja', 'warning');
    }
}

// Load user-specific data
async function loadUserData(user) {
    if (!user || !db) return;
    
    try {
        // Check if user is admin wilayah
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (adminDoc.exists) {
            currentUserData = adminDoc.data();
            DB.currentUser = user.email;
            DB.currentRole = 'wilayah';
            DB.isLoggedIn = true;
            initApp();
            return;
        }
        
        // Check if user is sekolah admin
        const sekolahDoc = await db.collection('sekolah_admins').doc(user.uid).get();
        if (sekolahDoc.exists) {
            currentUserData = sekolahDoc.data();
            DB.currentUser = user.email;
            DB.currentRole = 'sekolah';
            DB.currentSekolahId = currentUserData.sekolahId;
            DB.isLoggedIn = true;
            initApp();
            return;
        }
        
        // If not found in either, check localStorage for mapping
        const userMap = localStorage.getItem('siap_userMap');
        if (userMap) {
            const map = JSON.parse(userMap);
            const userInfo = map[user.email];
            if (userInfo) {
                DB.currentUser = user.email;
                DB.currentRole = userInfo.role;
                DB.currentSekolahId = userInfo.sekolahId;
                DB.isLoggedIn = true;
                initApp();
            }
        }
        
    } catch (error) {
        console.error('Error loading user data:', error);
    }
}

// Load all data from Firestore
async function loadAllDataFromFirestore() {
    if (!firebaseReady || !db) {
        console.log('Firebase not ready, using local data');
        return;
    }

    try {
        // Load sekolah list
        const sekolahSnapshot = await db.collection('sekolah').orderBy('id').get();
        if (!sekolahSnapshot.empty) {
            DB.sekolahList = sekolahSnapshot.docs.map(doc => doc.data());
            console.log('Loaded', DB.sekolahList.length, 'schools from Firestore');
        }

        // Load passwords
        const passwordsSnapshot = await db.collection('passwords').doc('credentials').get();
        if (passwordsSnapshot.exists) {
            DB.passwords = passwordsSnapshot.data();
            console.log('Loaded passwords from Firestore');
        }

        // Load pengumuman
        const pengumumanSnapshot = await db.collection('pengumuman').orderBy('id').get();
        if (!pengumumanSnapshot.empty) {
            DB.pengumumanList = pengumumanSnapshot.docs.map(doc => doc.data());
        }

        // Load pengajuan
        const pengajuanSnapshot = await db.collection('pengajuan').orderBy('id').get();
        if (!pengajuanSnapshot.empty) {
            DB.pengajuanList = pengajuanSnapshot.docs.map(doc => doc.data());
        }

        // Load PIP data
        const pipVervalSnapshot = await db.collection('pipVerval').orderBy('id').get();
        if (!pipVervalSnapshot.empty) {
            DB.pipVerval = pipVervalSnapshot.docs.map(doc => doc.data());
        }

        const pipPemberkasanSnapshot = await db.collection('pipPemberkasan').orderBy('id').get();
        if (!pipPemberkasanSnapshot.empty) {
            DB.pipPemberkasan = pipPemberkasanSnapshot.docs.map(doc => doc.data());
        }

        // Load settings (tahun ajaran, dll)
        const settingsSnapshot = await db.collection('settings').doc('config').get();
        if (settingsSnapshot.exists) {
            const settings = settingsSnapshot.data();
            if (settings.pipTahunAktif) DB.pipTahunAktif = settings.pipTahunAktif;
            if (settings.pipNominal) DB.pipNominal = settings.pipNominal;
        }

        // Update school dropdown if visible
        updateSekolahDropdown();

    } catch (error) {
        console.error('Error loading data from Firestore:', error);
    }
}

// Seed initial data to Firestore (only if empty)
async function seedInitialDataToFirestore() {
    if (!firebaseReady || !db) return;
    
    try {
        // Check if sekolah collection is empty
        const existingSekolah = await db.collection('sekolah').limit(1).get();
        if (!existingSekolah.empty) {
            console.log('Firestore already has data, skipping seed');
            return;
        }
        
        console.log('Seeding initial data to Firestore...');
        
        // Save all sekolah
        for (const sekolah of DB.sekolahList) {
            await db.collection('sekolah').doc(String(sekolah.id)).set(sekolah);
        }
        
        // Save passwords
        await db.collection('passwords').doc('credentials').set(DB.passwords);
        
        // Save pengumuman
        for (const pengumuman of DB.pengumumanList) {
            await db.collection('pengumuman').doc(String(pengumuman.id)).set(pengumuman);
        }
        
        // Save settings
        await db.collection('settings').doc('config').set({
            pipTahunAktif: DB.pipTahunAktif,
            pipNominal: DB.pipNominal
        });
        
        console.log('Initial data seeded to Firestore successfully');
        
    } catch (error) {
        console.error('Error seeding data to Firestore:', error);
    }
}

function showToast(msg, type='success') {
    const c = document.getElementById('toastContainer');
    const colors = { success:'bg-green-500', error:'bg-red-500', warning:'bg-yellow-500', info:'bg-blue-500' };
    const icons = { success:'fa-check-circle', error:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
    const t = document.createElement('div');
    t.className = `toast ${colors[type]} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm`;
    t.innerHTML = `<i class="fas ${icons[type]}"></i><span>${escapeHtml(msg)}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

let sidebarOpen = true;
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.querySelector('main');
    const openBtn = document.getElementById('sidebarOpenBtn');
    const overlay = document.getElementById('sidebarOverlay');
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
        sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('active');
    } else {
        sidebarOpen = !sidebarOpen;
        if (sidebarOpen) { sidebar.classList.remove('collapsed'); main.classList.remove('expanded'); openBtn.classList.add('hidden'); }
        else { sidebar.classList.add('collapsed'); main.classList.add('expanded'); openBtn.classList.remove('hidden'); openBtn.classList.add('flex'); }
    }
}

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const main = document.querySelector('main');
    const openBtn = document.getElementById('sidebarOpenBtn');
    if (window.innerWidth <= 768) {

async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
        showToast('Email dan password harus diisi!', 'error');
        return;
    }
    
    if (!firebaseReady || !auth) {
        showToast('Firebase belum siap. Gunakan mode offline.', 'warning');
        fallbackLogin(email, password);
        return;
    }
    
    try {
        showToast('Memverifikasi...', 'info');
        
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        closeLoginModal();
        showToast('Berhasil masuk!', 'success');
        
    } catch (error) {
        console.error('Login error:', error);
        
        let errorMsg = 'Login gagal!';
        if (error.code === 'auth/user-not-found') {
            errorMsg = 'Email tidak terdaftar!';
        } else if (error.code === 'auth/wrong-password') {
            errorMsg = 'Password salah!';
        } else if (error.code === 'auth/invalid-email') {
            errorMsg = 'Format email tidak valid!';
        } else if (error.code === 'auth/too-many-requests') {
            errorMsg = 'Terlalu banyak percobaan. Coba lagi nanti.';
        }
        
        showToast(errorMsg, 'error');
    }
}

// Fallback login for offline mode
function fallbackLogin(email, password) {
    // Check localStorage for user credentials
    const userMap = localStorage.getItem('siap_userMap');
    if (userMap) {
        const map = JSON.parse(userMap);
        const userInfo = map[email];
        if (userInfo && userInfo.password === password) {
            DB.currentUser = email;
            DB.currentRole = userInfo.role;
            DB.currentSekolahId = userInfo.sekolahId;
            DB.isLoggedIn = true;
            closeLoginModal();
            initApp();
            showToast('Berhasil masuk (mode offline)!', 'success');
            return;
        }
    }
    
    // Check default admin
    if (email === 'admin@siap.go.id' && password === 'admin123') {
        DB.currentUser = email;
        DB.currentRole = 'wilayah';
        DB.isLoggedIn = true;
        closeLoginModal();
        initApp();
        showToast('Berhasil masuk (admin default)!', 'success');
        return;
    }
    
    showToast('Email atau password salah!', 'error');
}

async function doRegister() {
    const nama = document.getElementById('regNama').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const passwordConfirm = document.getElementById('regPasswordConfirm').value;
    const role = document.getElementById('regRole').value;
    const sekolahId = document.getElementById('regSekolahId')?.value;
    
    // Validasi
    if (!nama || !email || !password || !passwordConfirm) {
        showToast('Semua field harus diisi!', 'error');
        return;
    }
    
    if (password.length < 6) {
        showToast('Password minimal 6 karakter!', 'error');
        return;
    }
    
    if (password !== passwordConfirm) {
        showToast('Konfirmasi password tidak cocok!', 'error');
        return;
    }
    
    if (!firebaseReady || !auth) {
        showToast('Firebase belum siap. Tidak bisa mendaftar.', 'error');
        return;
    }
    
    try {
        showToast('Membuat akun...', 'info');
        
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Save user data to Firestore
        const userData = {
            uid: user.uid,
            nama: nama,
            email: email,
            role: role,
            sekolahId: sekolahId ? parseInt(sekolahId) : null,
            createdAt: new Date().toISOString(),
            status: 'pending' // Perlu approval admin wilayah
        };
        
        await db.collection('sekolah_admins').doc(user.uid).set(userData);
        
        // Also save to localStorage for offline access
        const userMap = JSON.parse(localStorage.getItem('siap_userMap') || '{}');
        userMap[email] = { ...userData, password: password };
        localStorage.setItem('siap_userMap', JSON.stringify(userMap));
        
        showToast('Akun berhasil dibuat! Silakan login.', 'success');
        switchTab('login');
        
    } catch (error) {
        console.error('Register error:', error);
        
        let errorMsg = 'Pendaftaran gagal!';
        if (error.code === 'auth/email-already-in-use') {
            errorMsg = 'Email sudah terdaftar!';
        } else if (error.code === 'auth/invalid-email') {
            errorMsg = 'Format email tidak valid!';
        } else if (error.code === 'auth/weak-password') {
            errorMsg = 'Password terlalu lemah!';
        }
        
        showToast(errorMsg, 'error');
    }
}

async function doResetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    
    if (!email) {
        showToast('Masukkan email Anda!', 'error');
        return;
    }
    
    if (!firebaseReady || !auth) {
        showToast('Firebase belum siap. Tidak bisa reset password.', 'error');
        return;
    }
    
    try {
        await auth.sendPasswordResetEmail(email);
        closeModal();
        showToast('Link reset password telah dikirim ke email Anda!', 'success');
    } catch (error) {
        console.error('Reset password error:', error);
        
        let errorMsg = 'Gagal mengirim email reset!';
        if (error.code === 'auth/user-not-found') {
            errorMsg = 'Email tidak terdaftar!';
        } else if (error.code === 'auth/invalid-email') {
            errorMsg = 'Format email tidak valid!';
        }
        
        showToast(errorMsg, 'error');
    }
}

async function doLogout() {
    try {
        if (auth) {
            await auth.signOut();
        }
    } catch (error) {
        console.error('Logout error:', error);
    }
    
    DB.currentUser = null; 
    DB.currentRole = null; 
    DB.currentSekolahId = null; 
    DB.isLoggedIn = false;
    currentUserData = null;
    
    destroyCharts(); 
    initPublicView(); 
    showToast('Anda telah keluar dari sistem.', 'info');
}

function updateUIForLoginState() {
    const loggedIn = DB.isLoggedIn;
    const topLoginBtn = document.getElementById('topLoginBtn');
    if (topLoginBtn) topLoginBtn.style.display = loggedIn ? 'none' : 'flex';
    const notifBtnWrap = document.getElementById('notifBtnWrap');
    if (notifBtnWrap) notifBtnWrap.style.display = loggedIn ? 'block' : 'none';
    const syncStatus = document.getElementById('syncStatus');
    if (syncStatus) {
        if (loggedIn && DB.currentRole === 'wilayah') { syncStatus.classList.remove('hidden'); syncStatus.classList.add('flex'); }
        else { syncStatus.classList.add('hidden'); syncStatus.classList.remove('flex'); }
    }
    const userInfoSection = document.getElementById('userInfoSection');
    if (userInfoSection) userInfoSection.style.display = loggedIn ? 'block' : 'none';
    const bottom = document.getElementById('sidebarBottom');
    if (bottom) {
        bottom.innerHTML = loggedIn ?
            `<button onclick="doLogout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-red-300 hover:bg-red-500/20 transition text-sm"><i class="fas fa-sign-out-alt"></i>Keluar</button>` :

function toggleSelectAllSekolah() {
    const checkAll = document.getElementById('checkAllSekolah');
    const checkboxes = document.querySelectorAll('.sekolah-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = checkAll.checked;
    });
    updateSekolahSelection();
}

function updateSekolahSelection() {
    const checkboxes = document.querySelectorAll('.sekolah-checkbox:checked');
    selectedSekolahIds = Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
    
    const btnHapus = document.getElementById('btnHapusTerpilih');
    const jumlahSpan = document.getElementById('jumlahTerpilih');
    
    if (selectedSekolahIds.length > 0) {
        btnHapus.classList.remove('hidden');
        jumlahSpan.textContent = selectedSekolahIds.length;
    } else {
        btnHapus.classList.add('hidden');
    }
}

function hapusSekolahTerpilih() {
    if (selectedSekolahIds.length === 0) return;
    
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-trash text-red-600 text-2xl"></i></div>
                <h3 class="text-lg font-semibold">Hapus Sekolah Terpilih</h3>
                <p class="text-sm text-gray-500 mt-1">${selectedSekolahIds.length} sekolah akan dihapus</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
                <p class="text-sm text-red-700">Data sekolah akan dihapus permanen dan tidak dapat dikembalikan.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="doHapusSekolahTerpilih()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-xl text-sm font-medium">Hapus Semua</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

async function doHapusSekolahTerpilih() {
    const jumlahDihapus = selectedSekolahIds.length;
    
    for (const id of selectedSekolahIds) {
        const idx = DB.sekolahList.findIndex(x => x.id === id);
        if (idx > -1) {
            const deletedSekolah = DB.sekolahList[idx];
            DB.sekolahList.splice(idx, 1);
            
            // Delete password for the school
            if (deletedSekolah && DB.passwords[deletedSekolah.npsn]) {
                delete DB.passwords[deletedSekolah.npsn];
            }
            
            // Delete from Firestore (if connected)
            if (firebaseReady) {
                await deleteSekolahFromFirestore(id);
            }
        }
    }
    
    // Save to localStorage (always)
    saveToLocalStorage();
    
    // Save passwords to Firestore (if connected)
    if (firebaseReady) {
        await savePasswordToFirestore();
    }
    
    selectedSekolahIds = [];
    closeModal();
    showToast(`${jumlahDihapus} sekolah berhasil dihapus!`, 'success');
    renderWSekolah();
    updateSekolahDropdown();
}

function filterSekolahTable() {
    const search = document.getElementById('searchSekolah').value.toLowerCase();
    const jenjang = document.getElementById('filterJenjang').value;
    const filtered = DB.sekolahList.filter(s => (s.nama.toLowerCase().includes(search) || s.npsn.includes(search)) && (!jenjang || s.jenjang === jenjang));
    document.getElementById('sekolahTbody').innerHTML = renderSekolahRows(filtered);
}

function doTambahSekolah() {
    const newId = DB.sekolahList.length > 0 ? Math.max(...DB.sekolahList.map(s => s.id)) + 1 : 1;

        id: newId,
        npsn: document.getElementById('addNpsn').value,

        jenjang: document.getElementById('addJenjang').value,
        alamat: document.getElementById('addAlamat').value,

        akreditasi: document.getElementById('addAkr').value,
        siswa: 0, guru: 0, rombel: 0, online: false, lastSync: '-'
    };
    DB.sekolahList.push(newSekolah);

let uploadedFiles = [];
function handlePengajuanFile(input) {
    const fileList = document.getElementById('pengajuanFileList');
    Array.from(input.files).forEach(file => {
        if (file.type === 'application/pdf' && file.size <= 5*1024*1024) {
            uploadedFiles.push(file.name);
        }
    });
    fileList.innerHTML = uploadedFiles.map((f, i) => `
        <div class="file-item flex items-center justify-between p-3 bg-gray-50 rounded-xl">
            <div class="flex items-center gap-2"><i class="fas fa-file-pdf text-red-500"></i><span class="text-sm">${escapeHtml(f)}</span></div>
            <button onclick="removeFile(${i})" class="text-red-500 hover:text-red-700"><i class="fas fa-times"></i></button>
        </div>
    `).join('');
}

function removeFile(index) {
    uploadedFiles.splice(index, 1);
    handlePengajuanFile({files: []});
}

function savePengajuanDraft(jenis) {
    const newId = Math.max(0, ...DB.pengajuanList.map(p => p.id)) + 1;
    DB.pengajuanList.push({
        id: newId,
        jenis: jenis,
        nama: document.getElementById('pengajuanNama').value,
        nip: document.getElementById('pengajuanNip').value,
        nisn: jenis === 'mutasi_siswa' ? document.getElementById('pengajuanNip').value : null,
        tanggal: document.getElementById('pengajuanTanggal').value,
        status: 'draft',
        sekolahId: DB.currentSekolahId,
        dokumen: [...uploadedFiles]
    });
    uploadedFiles = [];
    closeModal();
    showToast('Draft pengajuan disimpan!');
    renderPengajuanList(jenis, 'sekolah');
}

function submitPengajuanBaru(jenis) {
    const newId = Math.max(0, ...DB.pengajuanList.map(p => p.id)) + 1;
    DB.pengajuanList.push({
        id: newId,
        jenis: jenis,
        nama: document.getElementById('pengajuanNama').value,
        nip: document.getElementById('pengajuanNip').value,
        nisn: jenis === 'mutasi_siswa' ? document.getElementById('pengajuanNip').value : null,
        tanggal: document.getElementById('pengajuanTanggal').value,
        status: 'diajukan',
        sekolahId: DB.currentSekolahId,
        dokumen: [...uploadedFiles]
    });
    uploadedFiles = [];
    closeModal();
    showToast('Pengajuan berhasil diajukan!');
    renderPengajuanList(jenis, 'sekolah');
}

function printLaporan(type) {
    showToast(`Mencetak laporan ${type}...`, 'info');
    setTimeout(() => {
        const printWin = window.open('', '', 'width=900,height=700');
        let content = `<html><head><title>Laporan ${type}</title><style>body{font-family:Arial,sans-serif;padding:30px;font-size:12px;}table{width:100%;border-collapse:collapse;margin:15px 0;}th,td{border:1px solid #333;padding:6px 8px;text-align:left;}th{background:#f0f0f0;}.header{text-align:center;border-bottom:3px double #333;padding-bottom:15px;margin-bottom:20px;}.logo{width:60px;height:60px;margin:0 auto 10px;}</style></head><body>`;
        content += `<div class="header"><img src="https://i.pinimg.com/1200x/76/39/2d/76392d91c9c22d8ec5563b1126cd55b8.jpg" class="logo"><h1>${DB.wilayah.nama.toUpperCase()}</h1><h2>LAPORAN ${type.toUpperCase()} BULANAN</h2><p>Tahun 2025</p></div>`;
        content += `<h3>A. Rekapitulasi Data</h3><table><tr><th>No</th><th>Sekolah</th><th>Siswa</th><th>GTK</th></tr>`;
        DB.sekolahList.forEach((s,i) => { content += `<tr><td>${i+1}</td><td>${s.nama}</td><td>${s.siswa}</td><td>${s.guru}</td></tr>`; });
        content += `<tr><th colspan="2">TOTAL</th><th>${DB.sekolahList.reduce((a,s)=>a+s.siswa,0)}</th><th>${DB.sekolahList.reduce((a,s)=>a+s.guru,0)}</th></tr></table>`;
        content += `<br><div style="display:flex;justify-content:flex-end;"><div style="text-align:center;"><p>${DB.wilayah.nama}, ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</p><p>Kepala Dinas</p><br><br><br><p><b><u>${DB.wilayah.kepala}</u></b></p></div></div>`;
        content += '</body></html>';
        printWin.document.write(content);
        printWin.document.close();
        printWin.print();
        showToast('Laporan berhasil dicetak!', 'success');
    }, 500);
}

function filterSiswaTable() {
    const search = document.getElementById('searchSiswa').value.toLowerCase();
    const kelas = document.getElementById('filterKelasSiswa').value;
    const siswa = DB.getSiswaBySekolah(DB.currentSekolahId);
    const filtered = siswa.filter(s => (s.nama.toLowerCase().includes(search) || s.nis.includes(search) || s.nisn.includes(search)) && (!kelas || s.kelas === kelas));
    document.getElementById('siswaTbody').innerHTML = renderSiswaRows(filtered);
}

function doHapusSiswa(id) {
    const list = DB.siswaList[DB.currentSekolahId];
    if (list) {
        const idx = list.findIndex(s => s.id === id);
        if (idx > -1) {
            list.splice(idx, 1);
            closeModal();
            showToast('Siswa berhasil dihapus!');
            renderSSiswa();
        }
    }
}

    const status = document.getElementById('filterStatusKepeg').value;
    const gtk = DB.getGtkBySekolah(DB.currentSekolahId);
    const filtered = gtk.filter(g => (g.nama.toLowerCase().includes(search) || g.nip.includes(search)) && (!status || g.statusKepeg === status));
    document.getElementById('gtkTbody').innerHTML = renderGtkRows(filtered);
}

function doTambahGtk() {
    if (!DB.gtkList[DB.currentSekolahId]) DB.gtkList[DB.currentSekolahId] = [];
    const newId = DB.getNextGtkId(DB.currentSekolahId);
    DB.gtkList[DB.currentSekolahId].push({
        id: newId,
        nip: document.getElementById('addGtkNip').value,
        nama: document.getElementById('addGtkNama').value,
        jabatan: document.getElementById('addGtkJabatan').value,
        mapel: document.getElementById('addGtkMapel').value,
        pendidikan: document.getElementById('addGtkPendidikan').value,
        statusKepeg: document.getElementById('addGtkStatus').value,

    showToast('GTK berhasil ditambahkan!');
    renderSGtk();
}

function doHapusGtk(id) {
    const list = DB.gtkList[DB.currentSekolahId];
    if (list) {
        const idx = list.findIndex(g => g.id === id);
        if (idx > -1) {
            list.splice(idx, 1);
            closeModal();
            showToast('GTK berhasil dihapus!');
            renderSGtk();
        }
    }
}

function renderSKeuangan() {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const base = sekolah ? sekolah.siswa * 1200000 : 300000000;
    const bulan = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
    
    // Generate monthly data
    const monthlyData = bulan.map((b, i) => {
        const factor = i < 6 ? 1 + (Math.random() * 0.2 - 0.1) : 0.5 + (Math.random() * 0.3);
        return {
            bulan: b,
            bosReguler: Math.round(base / 12 * factor),
            bosAfirmasi: Math.round(base * 0.1 / 12 * factor),
            bosKinerja: Math.round(base * 0.05 / 12 * factor),
            pegawai: Math.round(base * 0.35 / 12),
            barangJasa: Math.round(base * 0.25 / 12 * factor),
            pemeliharaan: Math.round(base * 0.1 / 12),
            kegiatanSiswa: Math.round(base * 0.07 / 12 * factor)
        };
    });
    
    const totalPenerimaan = monthlyData.reduce((a, m) => a + m.bosReguler + m.bosAfirmasi + m.bosKinerja, 0);
    const totalPengeluaran = monthlyData.reduce((a, m) => a + m.pegawai + m.barangJasa + m.pemeliharaan + m.kegiatanSiswa, 0);
    
    const contentArea = document.getElementById('contentArea');
    if (!contentArea) return;
    contentArea.innerHTML = `
        <div class="fade-in space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="stat-card bg-gradient-to-br from-green-500 to-green-700 text-white rounded-2xl p-5"><p class="text-green-100 text-sm">Total Penerimaan</p><p class="text-2xl font-bold">${formatRupiah(totalPenerimaan)}</p></div>
                <div class="stat-card bg-gradient-to-br from-red-500 to-red-700 text-white rounded-2xl p-5"><p class="text-red-100 text-sm">Total Pengeluaran</p><p class="text-2xl font-bold">${formatRupiah(totalPengeluaran)}</p></div>
                <div class="stat-card bg-gradient-to-br from-blue-500 to-blue-700 text-white rounded-2xl p-5"><p class="text-blue-100 text-sm">Saldo</p><p class="text-2xl font-bold">${formatRupiah(totalPenerimaan - totalPengeluaran)}</p></div>
            </div>
            
            <div class="bg-white rounded-2xl p-6 border shadow-sm">
                <h3 class="font-semibold mb-4">Detail Keuangan per Bulan (Tahun 2025)</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs border-collapse">

                            <tr class="bg-green-600 text-white">

function printLaporanSekolah(type) {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);

    const gtk = DB.getGtkBySekolah(DB.currentSekolahId);

        const printWin = window.open('', '', 'width=900,height=700');

        content += `<div class="header"><img src="https://i.pinimg.com/1200x/76/39/2d/76392d91c9c22d8ec5563b1126cd55b8.jpg" class="logo"><h1>${sekolah.nama.toUpperCase()}</h1><h2>LAPORAN ${type.toUpperCase()}</h2><p>Tahun Ajaran 2024/2025</p></div>`;
        
        if (type === 'siswa') {
            content += `<table><tr><th>No</th><th>NIS</th><th>NISN</th><th>Nama</th><th>Kelas</th><th>JK</th><th>Status</th></tr>`;
            siswa.forEach((s,i) => { content += `<tr><td>${i+1}</td><td>${s.nis}</td><td>${s.nisn}</td><td>${s.nama}</td><td>${s.kelas}</td><td>${s.jk}</td><td>${s.status}</td></tr>`; });
            content += `</table>`;
        } else if (type === 'gtk') {
            content += `<table><tr><th>No</th><th>NIP</th><th>Nama</th><th>Jabatan</th><th>Mapel</th><th>Status</th></tr>`;
            gtk.forEach((g,i) => { content += `<tr><td>${i+1}</td><td>${g.nip}</td><td>${g.nama}</td><td>${g.jabatan}</td><td>${g.mapel}</td><td>${g.statusKepeg}</td></tr>`; });
            content += `</table>`;
        }
        
        content += `<br><div style="display:flex;justify-content:flex-end;"><div style="text-align:center;"><p>${sekolah.alamat}, ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</p><p>Kepala Sekolah</p><br><br><br><p><b><u>${sekolah.kepsek}</u></b></p></div></div>`;
        content += '</body></html>';
        printWin.document.write(content);
        printWin.document.close();
        printWin.print();

    }, 500);
}

function downloadTemplate(type) {
    // Create CSV content for download
    let csvContent = '';
    let filename = '';
    
    if (type === 'siswa') {
        csvContent = 'NIS,NISN,Nama Lengkap,Kelas,Jenis Kelamin,Tempat Lahir,Tanggal Lahir,Alamat,Nama Orang Tua,No. HP Orang Tua,Status\n';
        csvContent += '001,001000001,Contoh Siswa,I,L,Jakarta,2018-05-10,Jl. Contoh No. 1,Nama Ortu,081234567890,Aktif\n';
        filename = 'template_siswa.csv';
    } else if (type === 'gtk') {
        csvContent = 'NIP,Nama Lengkap,Jabatan,Mata Pelajaran,Pendidikan,Status Kepegawaian,Tempat Lahir,Tanggal Lahir,Alamat,No. Telepon,Email\n';
        csvContent += '198501012010011001,Contoh Guru,Guru,Matematika,S1,PNS,Jakarta,1985-01-01,Jl. Contoh No. 1,081234567890,email@contoh.com\n';
        filename = 'template_gtk.csv';
    } else if (type === 'sarpras') {
        csvContent = 'Jenis Sarana,Jumlah,Kondisi Baik,Kondisi Rusak Ringan,Kondisi Rusak Berat,Keterangan\n';
        csvContent += 'Ruang Kelas,12,12,0,0,Baik\n';
        csvContent += 'Komputer,25,23,2,0,-\n';
        filename = 'template_sarpras.csv';
    } else if (type === 'keuangan') {
        csvContent = 'Jenis,Uraian,Jumlah,Tanggal,Keterangan\n';
        csvContent += 'Penerimaan,Dana BOS Reguler,500000000,2025-01-15,Transfer\n';
        csvContent += 'Pengeluaran,Belanja Pegawai,175000000,2025-01-20,Gaji\n';
        filename = 'template_keuangan.csv';
    }
    
    // Create download
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    
    showToast(`Template ${type} berhasil diunduh!`);
}

    const resultDiv = document.getElementById('uploadResult');
    
    progressDiv.classList.remove('hidden');
    fileNameP.textContent = file.name;

function changePassword() {
    const oldPass = document.getElementById('oldPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const npsn = sekolah?.npsn || DB.currentUser;
    
    // Validasi password lama
    if (oldPass !== DB.passwords[npsn]) {
        showToast('Password lama tidak sesuai!', 'error');
        return;
    }
    
    // Validasi password baru
    if (newPass.length < 6) {
        showToast('Password baru minimal 6 karakter!', 'error');
        return;
    }
    
    if (newPass !== confirmPass) {
        showToast('Konfirmasi password tidak cocok!', 'error');
        return;
    }
    
    // Simpan password baru
    DB.passwords[npsn] = newPass;
    
    // Save to localStorage (always)
    saveToLocalStorage();
    
    // Save to Firestore (if connected)
    if (firebaseReady) {
        savePasswordToFirestore(npsn, newPass);
    }
    
    showToast('Password berhasil diubah!', 'success');
    
    // Kosongkan form
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
}

                        <th class="p-4 text-left">Nama</th>
                        <th class="p-4 text-center">Kelas</th>
                        <th class="p-4 text-center">JK</th>
                        <th class="p-4 text-left">Nama Ortu</th>
                        <th class="p-4 text-left">Pekerjaan Ortu</th>
                        <th class="p-4 text-right">Penghasilan</th>

function renderPipUsulanRows(list) {
    if (list.length === 0) return '<tr><td colspan="9" class="p-8 text-center text-gray-500">Belum ada data calon penerima PIP</td></tr>';
    return list.map((c, i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="p-4">${i+1}</td>
            <td class="p-4">${escapeHtml(c.sekolah)}</td>
            <td class="p-4 font-mono">${c.nisn}</td>
            <td class="p-4 font-medium">${escapeHtml(c.nama)}</td>
            <td class="p-4 text-center">${c.kelas}</td>
            <td class="p-4 text-center"><span class="px-2 py-1 ${c.jk==='L'?'bg-blue-100 text-blue-700':'bg-pink-100 text-pink-700'} rounded-lg text-xs">${c.jk}</span></td>
            <td class="p-4">${escapeHtml(c.namaOrtu)}</td>
            <td class="p-4">${c.pekerjaanOrtu}</td>
            <td class="p-4 text-right">${formatRupiah(c.penghasilanOrtu)}</td>
        </tr>
    `).join('');
}

function filterPipUsulan() {
    const sekolahId = document.getElementById('filterSekolahPip').value;
    const filtered = [];
    DB.sekolahList.forEach(s => {
        if (!sekolahId || s.id == sekolahId) {
            const calonList = DB.pipCalon[s.id] || [];
            calonList.forEach(c => {
                filtered.push({ ...c, sekolahId: s.id, sekolah: s.nama });
            });
        }
    });
    document.getElementById('pipUsulanTbody').innerHTML = renderPipUsulanRows(filtered);
}

function downloadTemplatePip() {
    let csvContent = 'NISN,Nama Lengkap,Kelas,Jenis Kelamin (L/P),Nama Orang Tua,Pekerjaan Orang Tua,Penghasilan Orang Tua,Alamat\n';
    csvContent += '001000001,Contoh Siswa,I,L,Nama Ortu,Petani,800000,Jl. Contoh No. 1\n';
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'template_pip.csv';
    link.click();
    showToast('Template PIP berhasil diunduh!');
}

function toggleSelectAllPip() {
    const checkAll = document.getElementById('checkAllPip');
    const checkboxes = document.querySelectorAll('.pip-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = checkAll.checked;
        const id = parseInt(cb.dataset.id);
        const calon = DB.pipCalon[DB.currentSekolahId];
        if (calon) {
            const item = calon.find(c => c.id === id);
            if (item) item.selected = checkAll.checked;
        }
    });
}

function togglePipSelection(id) {
    const calon = DB.pipCalon[DB.currentSekolahId];
    if (calon) {
        const item = calon.find(c => c.id === id);
        if (item) item.selected = !item.selected;
    }
}

function submitUsulanPip() {
    const calon = DB.pipCalon[DB.currentSekolahId] || [];
    const selected = calon.filter(c => c.selected);
    const kuota = DB.getKuotaPIP(DB.currentSekolahId);
    const usulanSekarang = (DB.pipUsulan[DB.currentSekolahId] || []).length;
    
    if (selected.length === 0) {
        showToast('Pilih minimal satu calon penerima!', 'warning');
        return;
    }
    
    if (usulanSekarang + selected.length > kuota) {
        showToast(`Jumlah usulan melebihi kuota! Kuota: ${kuota}, Usulan: ${usulanSekarang}, Dipilih: ${selected.length}`, 'error');
        return;
    }
    
    // Add to usulan
    if (!DB.pipUsulan[DB.currentSekolahId]) DB.pipUsulan[DB.currentSekolahId] = [];
    selected.forEach(s => {
        const newId = DB.pipUsulan[DB.currentSekolahId].length > 0 ? Math.max(...DB.pipUsulan[DB.currentSekolahId].map(u => u.id)) + 1 : 1;
        DB.pipUsulan[DB.currentSekolahId].push({
            id: newId,
            nisn: s.nisn,
            nama: s.nama,
            kelas: s.kelas,
            jk: s.jk,
            namaOrtu: s.namaOrtu,
            pekerjaanOrtu: s.pekerjaanOrtu,
            penghasilanOrtu: s.penghasilanOrtu,
            statusUsulan: 'diajukan',
            tanggalUsul: new Date().toISOString().split('T')[0]
        });
        // Mark as diajukan in calon
        s.status = 'diajukan';
        s.selected = false;
    });
    
    showToast(`${selected.length} calon berhasil diajukan!`);
    renderSPipVerval();
}

function kirimUsulanPip() {
    const kuota = DB.getKuotaPIP(DB.currentSekolahId);
    const usulan = DB.getUsulanPIPBySekolah(DB.currentSekolahId);
    
    if (usulan.length !== kuota) {
        showToast(`Jumlah usulan (${usulan.length}) harus sama dengan kuota (${kuota})!`, 'error');
        return;
    }
    
    // Add to pipVerval (Admin Wilayah)
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    usulan.forEach(u => {
        const newId = DB.pipVerval.length > 0 ? Math.max(...DB.pipVerval.map(v => v.id)) + 1 : 1;
        DB.pipVerval.push({
            id: newId,
            sekolahId: DB.currentSekolahId,
            sekolah: sekolah?.nama || '',
            nisn: u.nisn,
            nama: u.nama,
            kelas: u.kelas,
            statusVerval: 'menunggu',
            tanggalVerval: '-'
        });
    });
    
    showToast('Usulan PIP berhasil dikirim ke Admin Wilayah!', 'success');
    renderSPipVerval();
}
