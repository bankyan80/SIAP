<script>
// ==================== FIREBASE CONFIGURATION ====================
//
// 📋 PETUNJUK KONFIGURASI FIREBASE:
// 1. Buka https://console.firebase.google.com/
// 2. Buat project baru atau pilih project yang sudah ada
// 3. Klik "Project Settings" (ikon gear) > General
// 4. Scroll ke bawah, cari "Your apps" > klik "</>" (Web app)
// 5. Copy nilai dari Firebase SDK configuration ke placeholder di bawah
//
// ⚠️ PENTING: Ganti semua nilai placeholder di bawah dengan konfigurasi Firebase Anda!
// ====================

// Firebase Configuration - Aplikasi SIAP
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDFadEnVo9fX64tw7uDTzT0ESoE5JAcx6c",
    authDomain: "aplikasi-siap-ef85e.firebaseapp.com",
    projectId: "aplikasi-siap-ef85e",
    storageBucket: "aplikasi-siap-ef85e.firebasestorage.app",
    messagingSenderId: "209198927274",
    appId: "1:209198927274:web:a1efcb7548791bb28b6fd3",
    measurementId: "G-H8MYTN5QMR"
};

// ==================== FIREBASE INITIALIZATION ====================
let firebaseApp = null;
let firebaseAuth = null;
let firebaseFirestore = null;
let firebaseStorage = null;
let firebaseInitialized = false;

function initializeFirebase() {
    try {
        // Cek apakah konfigurasi sudah diisi
        if (FIREBASE_CONFIG.apiKey === "YOUR_FIREBASE_API_KEY_HERE" ||
            FIREBASE_CONFIG.projectId === "YOUR_FIREBASE_PROJECT_ID_HERE") {
            console.warn('⚠️ Firebase belum dikonfigurasi. Silakan isi FIREBASE_CONFIG dengan kredensial Firebase Anda.');
            console.warn('📖 Buka Firebase Console: https://console.firebase.google.com/');
            return false;
        }

        // Initialize Firebase
        firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);

        // Initialize Services
        firebaseAuth = firebase.auth();
        firebaseFirestore = firebase.firestore();
        firebaseStorage = firebase.storage();

        // Enable offline persistence untuk Firestore
        firebaseFirestore.enablePersistence({ synchronizeTabs: true })
            .catch(err => {
                if (err.code === 'failed-precondition') {
                    console.warn('Firestore persistence tidak tersedia (multiple tabs open)');
                } else if (err.code === 'unimplemented') {
                    console.warn('Browser tidak mendukung Firestore persistence');
                }
            });

        firebaseInitialized = true;
        console.log('✅ Firebase berhasil diinisialisasi!');
        return true;

    } catch (error) {
        console.error('❌ Error initializing Firebase:', error);
        return false;
    }
}

// ==================== FIREBASE AUTH HELPERS ====================

// Login dengan Email/Password
async function firebaseLogin(email, password) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        const userCredential = await firebaseAuth.signInWithEmailAndPassword(email, password);
        console.log('✅ Login berhasil:', userCredential.user.email);
        return { success: true, user: userCredential.user };
    } catch (error) {
        console.error('❌ Login gagal:', error.message);
        return { success: false, error: error.message };
    }
}

// Logout
async function firebaseLogout() {
    if (!firebaseInitialized) return;
    try {
        await firebaseAuth.signOut();
        console.log('✅ Logout berhasil');
        return { success: true };
    } catch (error) {
        console.error('❌ Logout gagal:', error.message);
        return { success: false, error: error.message };
    }
}

// Cek status auth
function firebaseGetCurrentUser() {
    if (!firebaseInitialized) return null;
    return firebaseAuth.currentUser;
}

// Auth state listener
function firebaseOnAuthStateChanged(callback) {
    if (!firebaseInitialized) return;
    firebaseAuth.onAuthStateChanged(callback);
}

// ==================== FIREBASE FIRESTORE HELPERS ====================

// Simpan data ke Firestore
async function firebaseSaveDocument(collection, docId, data) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        const docRef = docId
            ? firebaseFirestore.collection(collection).doc(docId)
            : firebaseFirestore.collection(collection).doc();

        await docRef.set({
            ...data,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        console.log('✅ Dokumen berhasil disimpan:', collection, docRef.id);
        return { success: true, id: docRef.id };
    } catch (error) {
        console.error('❌ Gagal menyimpan dokumen:', error.message);
        return { success: false, error: error.message };
    }
}

// Ambil data dari Firestore
async function firebaseGetDocument(collection, docId) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        const docRef = firebaseFirestore.collection(collection).doc(docId);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
            return { success: true, data: { id: docSnap.id, ...docSnap.data() } };
        } else {
            return { success: false, error: 'Dokumen tidak ditemukan' };
        }
    } catch (error) {
        console.error('❌ Gagal mengambil dokumen:', error.message);
        return { success: false, error: error.message };
    }
}

// Ambil semua data dari collection
async function firebaseGetCollection(collection, queryConstraints = []) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        let query = firebaseFirestore.collection(collection);
        queryConstraints.forEach(constraint => {
            query = query.where(constraint.field, constraint.op, constraint.value);
        });

        const querySnapshot = await query.get();
        const data = [];
        querySnapshot.forEach(doc => {
            data.push({ id: doc.id, ...doc.data() });
        });

        return { success: true, data };
    } catch (error) {
        console.error('❌ Gagal mengambil collection:', error.message);
        return { success: false, error: error.message };
    }
}

// Hapus dokumen
async function firebaseDeleteDocument(collection, docId) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        await firebaseFirestore.collection(collection).doc(docId).delete();
        console.log('✅ Dokumen berhasil dihapus:', collection, docId);
        return { success: true };
    } catch (error) {
        console.error('❌ Gagal menghapus dokumen:', error.message);
        return { success: false, error: error.message };
    }
}

// ==================== FIREBASE STORAGE HELPERS ====================

// Upload file ke Firebase Storage
async function firebaseUploadFile(file, path) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        const storageRef = firebaseStorage.ref();
        const fileRef = storageRef.child(path);

        const uploadTask = await fileRef.put(file);
        const downloadURL = await uploadTask.ref.getDownloadURL();

        console.log('✅ File berhasil diupload:', downloadURL);
        return { success: true, url: downloadURL, path: path };
    } catch (error) {
        console.error('❌ Gagal upload file:', error.message);
        return { success: false, error: error.message };
    }
}

// Hapus file dari Storage
async function firebaseDeleteFile(path) {
    if (!firebaseInitialized) {
        throw new Error('Firebase belum diinisialisasi');
    }
    try {
        const storageRef = firebaseStorage.ref();
        const fileRef = storageRef.child(path);
        await fileRef.delete();

        console.log('✅ File berhasil dihapus:', path);
        return { success: true };
    } catch (error) {
        console.error('❌ Gagal menghapus file:', error.message);
        return { success: false, error: error.message };
    }
}

// ==================== FIREBASE DATA SYNC ====================

// Sinkronisasi data sekolah ke Firestore
async function syncSekolahToFirebase(sekolahId) {
    if (!firebaseInitialized) return { success: false, error: 'Firebase tidak siap' };

    const sekolah = DB.sekolahList.find(s => s.id === sekolahId);
    if (!sekolah) return { success: false, error: 'Sekolah tidak ditemukan' };

    const result = await firebaseSaveDocument('sekolah', sekolahId.toString(), sekolah);
    return result;
}

// Sinkronisasi data siswa ke Firestore
async function syncSiswaToFirebase(sekolahId, siswaId) {
    if (!firebaseInitialized) return { success: false, error: 'Firebase tidak siap' };

    const siswaList = DB.siswaList[sekolahId];
    if (!siswaList) return { success: false, error: 'Data siswa tidak ditemukan' };

    const siswa = siswaList.find(s => s.id === siswaId);
    if (!siswa) return { success: false, error: 'Siswa tidak ditemukan' };

    const result = await firebaseSaveDocument(`sekolah/${sekolahId}/siswa`, siswaId.toString(), siswa);
    return result;
}

        { id: 2, sekolahId: 1, sekolah: 'SDN 1 Nusantara', nisn: '001000002', nama: 'Budi Santoso', kelas: 'I', statusBerkas: 'lengkap', tanggalBerkas: '2025-01-20', buktiBank: 'bukti_transfer_002.pdf' },
    ],

    // Tahun PIP aktif
    pipTahunAktif: '2025',

    // Nominal PIP per siswa
    pipNominal: 450000,

    getCalonPIPBySekolah(sekolahId) {
        return this.pipCalon[sekolahId] || [];
    },

    getUsulanPIPBySekolah(sekolahId) {
        return this.pipUsulan[sekolahId] || [];
    },

    getKuotaPIP(sekolahId) {
        return this.pipKuota[sekolahId] || 0;
    },

    getSiswaBySekolah(sekolahId) {
        return this.siswaList[sekolahId] || [];
    },

    getGtkBySekolah(sekolahId) {
        return this.gtkList[sekolahId] || [];
    },

    keuanganBySekolah(sekolahId) {
        const sekolah = this.sekolahList.find(s => s.id === sekolahId);
        const base = sekolah ? sekolah.siswa * 1200000 : 300000000;
        return {
            penerimaan: [
                { uraian: 'Dana BOS Reguler', jumlah: base },
                { uraian: 'Dana BOS Afirmasi', jumlah: Math.round(base * 0.1) },
                { uraian: 'Dana BOS Kinerja', jumlah: Math.round(base * 0.05) },
                { uraian: 'Dana Komite', jumlah: Math.round(base * 0.15) },
            ],
            pengeluaran: [
                { uraian: 'Belanja Pegawai', jumlah: Math.round(base * 0.35) },
                { uraian: 'Belanja Barang & Jasa', jumlah: Math.round(base * 0.25) },
                { uraian: 'Pemeliharaan', jumlah: Math.round(base * 0.1) },
                { uraian: 'Kegiatan Siswa', jumlah: Math.round(base * 0.07) },
            ]
        };
    },

    getSarprasBySekolah(sekolahId) {
        return this.sarprasList.find(s => s.sekolahId === sekolahId) || null;
    },

    getPengajuanByFilter(jenis = null, status = null, sekolahId = null) {
        return this.pengajuanList.filter(p => {
            if (jenis && p.jenis !== jenis) return false;
            if (status && p.status !== status) return false;
            if (sekolahId && p.sekolahId !== sekolahId) return false;
            return true;
        });
    },

    // Generate next ID for siswa
    getNextSiswaId(sekolahId) {
        const list = this.siswaList[sekolahId] || [];
        return list.length > 0 ? Math.max(...list.map(s => s.id)) + 1 : 1;
    },

    // Generate next ID for GTK
    getNextGtkId(sekolahId) {
        const list = this.gtkList[sekolahId] || [];
        return list.length > 0 ? Math.max(...list.map(g => g.id)) + 1 : 1;
    }
};

function formatRupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }

function showToast(msg, type='success') {
    const c = document.getElementById('toastContainer');
    const colors = { success:'bg-green-500', error:'bg-red-500', warning:'bg-yellow-500', info:'bg-blue-500' };
    const icons = { success:'fa-check-circle', error:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
    const t = document.createElement('div');
    t.className = `toast ${colors[type]} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm`;
    t.innerHTML = `<i class="fas ${icons[type]}"></i><span>${escapeHtml(msg)}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

let sidebarOpen = true;
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.querySelector('main');
    const openBtn = document.getElementById('sidebarOpenBtn');
    const overlay = document.getElementById('sidebarOverlay');
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
        sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('active');
    } else {
        sidebarOpen = !sidebarOpen;
        if (sidebarOpen) { sidebar.classList.remove('collapsed'); main.classList.remove('expanded'); openBtn.classList.add('hidden'); }
        else { sidebar.classList.add('collapsed'); main.classList.add('expanded'); openBtn.classList.remove('hidden'); openBtn.classList.add('flex'); }
    }
}

window.addEventListener('resize', () => {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const main = document.querySelector('main');
    const openBtn = document.getElementById('sidebarOpenBtn');
    if (window.innerWidth <= 768) {
        sidebar.classList.remove('collapsed', 'mobile-open'); main.style.marginLeft = '0';
        overlay.classList.remove('active'); openBtn.classList.remove('hidden'); openBtn.classList.add('flex');
    } else {
        sidebar.classList.remove('mobile-open'); overlay.classList.remove('active');
        if (sidebarOpen) { sidebar.classList.remove('collapsed'); main.classList.remove('expanded'); openBtn.classList.add('hidden'); }
    }
});

function showLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }

document.getElementById('loginRole').addEventListener('change', function() {
    const sel = document.getElementById('sekolahSelect');
    if (this.value === 'sekolah') {
        sel.classList.remove('hidden');
        document.getElementById('loginSekolah').innerHTML = DB.sekolahList.map(s => `<option value="${s.id}" class="text-gray-800">${escapeHtml(s.nama)}</option>`).join('');
    } else { sel.classList.add('hidden'); }
});

function doLogin() {
    const role = document.getElementById('loginRole').value;
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;

    // Validasi kredensial
    if (role === 'wilayah') {
        // Admin Wilayah: username = k_017, password = 123456
        if (user !== 'k_017' || pass !== '123456') {
            showToast('Username atau password salah!', 'error');
            return;
        }
        DB.currentRole = 'wilayah';
        DB.currentUser = user;
        DB.isLoggedIn = true;
    } else {
        // Admin Sekolah: username = NPSN sekolah, password = 123456
        const sekolahId = parseInt(document.getElementById('loginSekolah').value);
        const sekolah = DB.sekolahList.find(s => s.id === sekolahId);
        if (!sekolah || user !== sekolah.npsn || pass !== '123456') {
            showToast('Username atau password salah! Gunakan NPSN sebagai username.', 'error');
            return;
        }
        DB.currentRole = 'sekolah';
        DB.currentUser = user;
        DB.currentSekolahId = sekolahId;
        DB.isLoggedIn = true;
    }

    closeLoginModal();
    initApp();
    showToast('Berhasil masuk ke sistem!');
}

function doLogout() {
    DB.currentUser = null; DB.currentRole = null; DB.currentSekolahId = null; DB.isLoggedIn = false;
    destroyCharts(); initPublicView(); showToast('Anda telah keluar dari sistem.', 'info');
}

function updateUIForLoginState() {
    const loggedIn = DB.isLoggedIn;
    const topLoginBtn = document.getElementById('topLoginBtn');
    if (topLoginBtn) topLoginBtn.style.display = loggedIn ? 'none' : 'flex';
    const notifBtnWrap = document.getElementById('notifBtnWrap');
    if (notifBtnWrap) notifBtnWrap.style.display = loggedIn ? 'block' : 'none';
    const syncStatus = document.getElementById('syncStatus');
    if (syncStatus) {
        if (loggedIn && DB.currentRole === 'wilayah') { syncStatus.classList.remove('hidden'); syncStatus.classList.add('flex'); }
        else { syncStatus.classList.add('hidden'); syncStatus.classList.remove('flex'); }
    }
    const userInfoSection = document.getElementById('userInfoSection');
    if (userInfoSection) userInfoSection.style.display = loggedIn ? 'block' : 'none';
    const bottom = document.getElementById('sidebarBottom');
    if (bottom) {
        bottom.innerHTML = loggedIn ?
            `<button onclick="doLogout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-red-300 hover:bg-red-500/20 transition text-sm"><i class="fas fa-sign-out-alt"></i>Keluar</button>` :

function renderWDashboard() {
    const totalSiswa = DB.sekolahList.reduce((a,s) => a+s.siswa, 0);
    const totalGuru = DB.sekolahList.reduce((a,s) => a+s.guru, 0);
    const totalSekolah = DB.sekolahList.length;
    const contentArea = document.getElementById('contentArea');
    if (!contentArea) return;
    contentArea.innerHTML = `
        <div class="fade-in space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="stat-card bg-gradient-to-br from-[#0f1e3c] to-[#1e3a5f] text-white rounded-2xl p-5"><p class="text-blue-100 text-sm">Sekolah</p><p class="text-3xl font-bold">${totalSekolah}</p></div>
                <div class="stat-card bg-gradient-to-br from-[#b91c1c] to-[#dc2626] text-white rounded-2xl p-5"><p class="text-red-100 text-sm">Siswa</p><p class="text-3xl font-bold">${totalSiswa.toLocaleString()}</p></div>
                <div class="stat-card bg-gradient-to-br from-[#1e3a5f] to-[#2d4a6f] text-white rounded-2xl p-5"><p class="text-blue-100 text-sm">GTK</p><p class="text-3xl font-bold">${totalGuru}</p></div>
                <div class="stat-card bg-gradient-to-br from-emerald-600 to-emerald-700 text-white rounded-2xl p-5"><p class="text-emerald-100 text-sm">Online</p><p class="text-3xl font-bold">${DB.sekolahList.filter(s=>s.online).length}/${totalSekolah}</p></div>
            </div>
        </div>
    `;
}

function renderWSekolah() {
    const contentArea = document.getElementById('contentArea');
    if (!contentArea) return;
    contentArea.innerHTML = `
        <div class="fade-in space-y-6">
            <div class="flex justify-between items-center">
                <div class="flex gap-3">
                    <input type="text" id="searchSekolah" placeholder="Cari sekolah..." class="border rounded-xl px-4 py-2 text-sm w-64" oninput="filterSekolahTable()">
                    <select id="filterJenjang" class="border rounded-xl px-4 py-2 text-sm" onchange="filterSekolahTable()"><option value="">Semua Jenjang</option><option value="SD">SD</option><option value="SMP">SMP</option></select>
                </div>
                <button onclick="showTambahSekolahModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium"><i class="fas fa-plus mr-2"></i>Tambah Sekolah</button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-sm">
                    <thead><tr class="bg-gray-50">
                        <th class="p-4 text-left">No</th><th class="p-4 text-left">NPSN</th><th class="p-4 text-left">Nama Sekolah</th><th class="p-4 text-center">Jenjang</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Siswa</th><th class="p-4 text-center">GTK</th><th class="p-4 text-center">Aksi</th>
                    </tr></thead>
                    <tbody id="sekolahTbody">${renderSekolahRows(DB.sekolahList)}</tbody>
                </table>
            </div>
        </div>
    `;
}

function renderSekolahRows(list) {
    return list.map((s,i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="p-4">${i+1}</td>
            <td class="p-4 font-mono">${s.npsn}</td>
            <td class="p-4 font-medium">${escapeHtml(s.nama)}</td>
            <td class="p-4 text-center"><span class="px-2 py-1 ${s.jenjang==='SD'?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700'} rounded-lg text-xs">${s.jenjang}</span></td>
            <td class="p-4 text-center"><span class="text-xs ${s.status==='Negeri'?'text-blue-600':'text-orange-600'}">${s.status}</span></td>
            <td class="p-4 text-center">${s.siswa}</td>
            <td class="p-4 text-center">${s.guru}</td>
            <td class="p-4 text-center">
                <button onclick="showEditSekolahModal(${s.id})" class="text-yellow-500 hover:text-yellow-700 mr-2" title="Edit"><i class="fas fa-edit"></i></button>
                <button onclick="showHapusSekolahModal(${s.id})" class="text-red-500 hover:text-red-700" title="Hapus"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function filterSekolahTable() {
    const search = document.getElementById('searchSekolah').value.toLowerCase();
    const jenjang = document.getElementById('filterJenjang').value;
    const filtered = DB.sekolahList.filter(s => (s.nama.toLowerCase().includes(search) || s.npsn.includes(search)) && (!jenjang || s.jenjang === jenjang));
    document.getElementById('sekolahTbody').innerHTML = renderSekolahRows(filtered);
}

                    <div><label class="text-sm text-gray-600 mb-1 block">Jenjang</label><select id="addJenjang" class="w-full border rounded-xl px-4 py-2.5 text-sm"><option>SD</option><option>SMP</option></select></div>

                    <div><label class="text-sm text-gray-600 mb-1 block">Akreditasi</label><select id="addAkr" class="w-full border rounded-xl px-4 py-2.5 text-sm"><option>A</option><option>B</option><option>C</option></select></div>

            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="doTambahSekolah()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-medium">Simpan</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>

function doTambahSekolah() {
    const newId = Math.max(...DB.sekolahList.map(s => s.id)) + 1;
    DB.sekolahList.push({
        id: newId,
        npsn: document.getElementById('addNpsn').value,
        nama: document.getElementById('addNama').value,
        jenjang: document.getElementById('addJenjang').value,
        alamat: document.getElementById('addAlamat').value,
        kepsek: document.getElementById('addKepsek').value,
        status: document.getElementById('addStatus').value,
        akreditasi: document.getElementById('addAkr').value,
        siswa: 0, guru: 0, rombel: 0, online: false, lastSync: '-'
    });
    closeModal();
    showToast('Sekolah berhasil ditambahkan!');
    renderWSekolah();
}

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-sm text-gray-600 mb-1 block">NPSN</label><input type="text" id="editNpsn" value="${s.npsn}" class="w-full border rounded-xl px-4 py-2.5 text-sm"></div>
                    <div><label class="text-sm text-gray-600 mb-1 block">Jenjang</label><select id="editJenjang" class="w-full border rounded-xl px-4 py-2.5 text-sm"><option ${s.jenjang==='SD'?'selected':''}>SD</option><option ${s.jenjang==='SMP'?'selected':''}>SMP</option></select></div>

                <div><label class="text-sm text-gray-600 mb-1 block">Kepala Sekolah</label><input type="text" id="editKepsek" value="${s.kepsek}" class="w-full border rounded-xl px-4 py-2.5 text-sm"></div>
                <div class="grid grid-cols-2 gap-4">

                    <div><label class="text-sm text-gray-600 mb-1 block">Akreditasi</label><select id="editAkr" class="w-full border rounded-xl px-4 py-2.5 text-sm"><option ${s.akreditasi==='A'?'selected':''}>A</option><option ${s.akreditasi==='B'?'selected':''}>B</option><option ${s.akreditasi==='C'?'selected':''}>C</option></select></div>

            </div>

}

function doEditSekolah(id) {
    const s = DB.sekolahList.find(x => x.id === id);
    if (s) {
        s.npsn = document.getElementById('editNpsn').value;
        s.nama = document.getElementById('editNama').value;
        s.jenjang = document.getElementById('editJenjang').value;
        s.alamat = document.getElementById('editAlamat').value;
        s.kepsek = document.getElementById('editKepsek').value;
        s.status = document.getElementById('editStatus').value;
        s.akreditasi = document.getElementById('editAkr').value;
        closeModal();
        showToast('Sekolah berhasil diupdate!');
        renderWSekolah();
    }
}

function showHapusSekolahModal(id) {
    const s = DB.sekolahList.find(x => x.id === id);
    if (!s) return;
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-trash text-red-600 text-2xl"></i></div>
                <h3 class="text-lg font-semibold">Hapus Sekolah</h3>
                <p class="text-sm text-gray-500 mt-1">${escapeHtml(s.nama)}</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
                <p class="text-sm text-red-700">Data sekolah akan dihapus permanen dan tidak dapat dikembalikan.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="doHapusSekolah(${id})" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-xl text-sm font-medium">Hapus</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

function doHapusSekolah(id) {
    const idx = DB.sekolahList.findIndex(x => x.id === id);
    if (idx > -1) { DB.sekolahList.splice(idx, 1); closeModal(); showToast('Sekolah berhasil dihapus!'); renderWSekolah(); }
}

let uploadedFiles = [];
function handlePengajuanFile(input) {
    const fileList = document.getElementById('pengajuanFileList');
    Array.from(input.files).forEach(file => {
        if (file.type === 'application/pdf' && file.size <= 5*1024*1024) {
            uploadedFiles.push(file.name);
        }
    });
    fileList.innerHTML = uploadedFiles.map((f, i) => `
        <div class="file-item flex items-center justify-between p-3 bg-gray-50 rounded-xl">
            <div class="flex items-center gap-2"><i class="fas fa-file-pdf text-red-500"></i><span class="text-sm">${escapeHtml(f)}</span></div>
            <button onclick="removeFile(${i})" class="text-red-500 hover:text-red-700"><i class="fas fa-times"></i></button>
        </div>
    `).join('');
}

function removeFile(index) {
    uploadedFiles.splice(index, 1);
    handlePengajuanFile({files: []});
}

function savePengajuanDraft(jenis) {
    const newId = Math.max(0, ...DB.pengajuanList.map(p => p.id)) + 1;
    DB.pengajuanList.push({
        id: newId,
        jenis: jenis,
        nama: document.getElementById('pengajuanNama').value,
        nip: document.getElementById('pengajuanNip').value,
        nisn: jenis === 'mutasi_siswa' ? document.getElementById('pengajuanNip').value : null,
        tanggal: document.getElementById('pengajuanTanggal').value,
        status: 'draft',
        sekolahId: DB.currentSekolahId,
        dokumen: [...uploadedFiles]
    });
    uploadedFiles = [];
    closeModal();
    showToast('Draft pengajuan disimpan!');
    renderPengajuanList(jenis, 'sekolah');
}

function submitPengajuanBaru(jenis) {
    const newId = Math.max(0, ...DB.pengajuanList.map(p => p.id)) + 1;
    DB.pengajuanList.push({
        id: newId,
        jenis: jenis,
        nama: document.getElementById('pengajuanNama').value,
        nip: document.getElementById('pengajuanNip').value,
        nisn: jenis === 'mutasi_siswa' ? document.getElementById('pengajuanNip').value : null,
        tanggal: document.getElementById('pengajuanTanggal').value,
        status: 'diajukan',
        sekolahId: DB.currentSekolahId,
        dokumen: [...uploadedFiles]
    });
    uploadedFiles = [];
    closeModal();
    showToast('Pengajuan berhasil diajukan!');
    renderPengajuanList(jenis, 'sekolah');
}

    const sekolah = DB.sekolahList.find(s => s.id === p.sekolahId);

    const statusClasses = { draft:'status-draft', diajukan:'status-diajukan', diproses:'status-diproses', disetujui:'status-disetujui', ditolak:'status-ditolak' };

                <span class="px-3 py-1 rounded-full text-xs font-medium ${statusClasses[p.status]}">${statusLabels[p.status]}</span>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">

                <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-500">NIP/NISN</p><p class="font-medium font-mono">${p.nip || p.nisn || '-'}</p></div>
                <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-500">Tanggal</p><p class="font-medium">${p.tanggal}</p></div>

            <div class="mb-4">

function approvePengajuan(id, jenis, role) {
    const p = DB.pengajuanList.find(x => x.id === id);
    if (p) { p.status = 'disetujui'; showToast('Pengajuan disetujui!'); renderPengajuanList(jenis, role); }
}

function rejectPengajuan(id, jenis, role) {
    const p = DB.pengajuanList.find(x => x.id === id);
    if (p) { p.status = 'ditolak'; showToast('Pengajuan ditolak.', 'warning'); renderPengajuanList(jenis, role); }
}

function submitPengajuan(id, jenis) {
    const p = DB.pengajuanList.find(x => x.id === id);
    if (p) { p.status = 'diajukan'; showToast('Pengajuan berhasil diajukan!'); renderPengajuanList(jenis, 'sekolah'); }
}

function deletePengajuan(id, jenis) {
    const idx = DB.pengajuanList.findIndex(x => x.id === id);
    if (idx > -1) { DB.pengajuanList.splice(idx, 1); showToast('Pengajuan dihapus!'); renderPengajuanList(jenis, 'sekolah'); }
}

function printLaporan(type) {
    showToast(`Mencetak laporan ${type}...`, 'info');
    setTimeout(() => {
        const printWin = window.open('', '', 'width=900,height=700');
        let content = `<html><head><title>Laporan ${type}</title><style>body{font-family:Arial,sans-serif;padding:30px;font-size:12px;}table{width:100%;border-collapse:collapse;margin:15px 0;}th,td{border:1px solid #333;padding:6px 8px;text-align:left;}th{background:#f0f0f0;}.header{text-align:center;border-bottom:3px double #333;padding-bottom:15px;margin-bottom:20px;}.logo{width:60px;height:60px;margin:0 auto 10px;}</style></head><body>`;
        content += `<div class="header"><img src="https://i.pinimg.com/1200x/76/39/2d/76392d91c9c22d8ec5563b1126cd55b8.jpg" class="logo"><h1>${DB.wilayah.nama.toUpperCase()}</h1><h2>LAPORAN ${type.toUpperCase()} BULANAN</h2><p>Tahun 2025</p></div>`;
        content += `<h3>A. Rekapitulasi Data</h3><table><tr><th>No</th><th>Sekolah</th><th>Siswa</th><th>GTK</th></tr>`;
        DB.sekolahList.forEach((s,i) => { content += `<tr><td>${i+1}</td><td>${s.nama}</td><td>${s.siswa}</td><td>${s.guru}</td></tr>`; });
        content += `<tr><th colspan="2">TOTAL</th><th>${DB.sekolahList.reduce((a,s)=>a+s.siswa,0)}</th><th>${DB.sekolahList.reduce((a,s)=>a+s.guru,0)}</th></tr></table>`;
        content += `<br><div style="display:flex;justify-content:flex-end;"><div style="text-align:center;"><p>${DB.wilayah.nama}, ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</p><p>Kepala Dinas</p><br><br><br><p><b><u>${DB.wilayah.kepala}</u></b></p></div></div>`;
        content += '</body></html>';
        printWin.document.write(content);
        printWin.document.close();
        printWin.print();
        showToast('Laporan berhasil dicetak!', 'success');
    }, 500);
}

function renderSiswaRows(list) {
    if (list.length === 0) return '<tr><td colspan="8" class="p-8 text-center text-gray-500">Belum ada data siswa</td></tr>';
    return list.map((s,i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="p-4">${i+1}</td>
            <td class="p-4 font-mono">${s.nis}</td>
            <td class="p-4 font-mono">${s.nisn}</td>
            <td class="p-4 font-medium">${escapeHtml(s.nama)}</td>
            <td class="p-4 text-center">${s.kelas}</td>
            <td class="p-4 text-center"><span class="px-2 py-1 ${s.jk==='L'?'bg-blue-100 text-blue-700':'bg-pink-100 text-pink-700'} rounded-lg text-xs">${s.jk}</span></td>
            <td class="p-4 text-center"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-lg text-xs">${s.status}</span></td>
            <td class="p-4 text-center">
                <button onclick="showDetailSiswa(${s.id})" class="text-blue-500 hover:text-blue-700 mr-2" title="Detail"><i class="fas fa-eye"></i></button>

                <button onclick="showHapusSiswaModal(${s.id})" class="text-red-500 hover:text-red-700" title="Hapus"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function filterSiswaTable() {
    const search = document.getElementById('searchSiswa').value.toLowerCase();
    const kelas = document.getElementById('filterKelasSiswa').value;
    const siswa = DB.getSiswaBySekolah(DB.currentSekolahId);
    const filtered = siswa.filter(s => (s.nama.toLowerCase().includes(search) || s.nis.includes(search) || s.nisn.includes(search)) && (!kelas || s.kelas === kelas));
    document.getElementById('siswaTbody').innerHTML = renderSiswaRows(filtered);
}

                        <option value="">Semua Status</option>
                        <option value="PNS">PNS</option>
                        <option value="PPPK">PPPK</option>
                        <option value="Honorer">Honorer</option>
                    </select>

                    </tr></thead>
                    <tbody id="gtkTbody">${renderGtkRows(gtk)}</tbody>
                </table>
            </div>

}

function renderGtkRows(list) {
    if (list.length === 0) return '<tr><td colspan="7" class="p-8 text-center text-gray-500">Belum ada data GTK</td></tr>';
    return list.map((g,i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="p-4">${i+1}</td>
            <td class="p-4 font-mono text-xs">${g.nip}</td>
            <td class="p-4 font-medium">${escapeHtml(g.nama)}</td>
            <td class="p-4 text-center">${g.jabatan}</td>
            <td class="p-4 text-center">${g.mapel}</td>
            <td class="p-4 text-center"><span class="px-2 py-1 ${g.statusKepeg==='PNS'?'bg-blue-100 text-blue-700':g.statusKepeg==='PPPK'?'bg-green-100 text-green-700':'bg-gray-100 text-gray-700'} rounded-lg text-xs">${g.statusKepeg}</span></td>
            <td class="p-4 text-center">
                <button onclick="showDetailGtk(${g.id})" class="text-blue-500 hover:text-blue-700 mr-2" title="Detail"><i class="fas fa-eye"></i></button>
                <button onclick="showEditGtkModal(${g.id})" class="text-yellow-500 hover:text-yellow-700 mr-2" title="Edit"><i class="fas fa-edit"></i></button>
                <button onclick="showHapusGtkModal(${g.id})" class="text-red-500 hover:text-red-700" title="Hapus"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function filterGtkTable() {
    const search = document.getElementById('searchGtk').value.toLowerCase();
    const status = document.getElementById('filterStatusKepeg').value;
    const gtk = DB.getGtkBySekolah(DB.currentSekolahId);
    const filtered = gtk.filter(g => (g.nama.toLowerCase().includes(search) || g.nip.includes(search)) && (!status || g.statusKepeg === status));
    document.getElementById('gtkTbody').innerHTML = renderGtkRows(filtered);
}

function renderSKeuangan() {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const base = sekolah ? sekolah.siswa * 1200000 : 300000000;
    const bulan = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
    
    // Generate monthly data
    const monthlyData = bulan.map((b, i) => {
        const factor = i < 6 ? 1 + (Math.random() * 0.2 - 0.1) : 0.5 + (Math.random() * 0.3);
        return {
            bulan: b,
            bosReguler: Math.round(base / 12 * factor),
            bosAfirmasi: Math.round(base * 0.1 / 12 * factor),
            bosKinerja: Math.round(base * 0.05 / 12 * factor),
            pegawai: Math.round(base * 0.35 / 12),
            barangJasa: Math.round(base * 0.25 / 12 * factor),
            pemeliharaan: Math.round(base * 0.1 / 12),
            kegiatanSiswa: Math.round(base * 0.07 / 12 * factor)
        };
    });
    
    const totalPenerimaan = monthlyData.reduce((a, m) => a + m.bosReguler + m.bosAfirmasi + m.bosKinerja, 0);
    const totalPengeluaran = monthlyData.reduce((a, m) => a + m.pegawai + m.barangJasa + m.pemeliharaan + m.kegiatanSiswa, 0);
    
    const contentArea = document.getElementById('contentArea');
    if (!contentArea) return;
    contentArea.innerHTML = `
        <div class="fade-in space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="stat-card bg-gradient-to-br from-emerald-600 to-emerald-700 text-white rounded-2xl p-5"><p class="text-green-100 text-sm">Total Penerimaan</p><p class="text-2xl font-bold">${formatRupiah(totalPenerimaan)}</p></div>

            </div>
            
            <div class="bg-white rounded-2xl p-6 border shadow-sm">
                <h3 class="font-semibold mb-4">Detail Keuangan per Bulan (Tahun 2025)</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs border-collapse">
                        <thead>
                            <tr class="bg-green-600 text-white">
                                <th class="border p-2 text-left sticky left-0 bg-green-600" rowspan="2">Bulan</th>
                                <th class="border p-2 text-center" colspan="3">Penerimaan</th>
                                <th class="border p-2 text-center bg-red-100 text-red-800" colspan="4">Pengeluaran</th>
                                <th class="border p-2 text-center bg-blue-100 text-blue-800" rowspan="2">Saldo</th>
                            </tr>
                            <tr class="bg-green-500 text-white text-xs">
                                <th class="border p-1 text-center">BOS Reguler</th>
                                <th class="border p-1 text-center">Afirmasi</th>
                                <th class="border p-1 text-center">Kinerja</th>
                                <th class="border p-1 text-center bg-red-50 text-red-700">Pegawai</th>
                                <th class="border p-1 text-center bg-red-50 text-red-700">Barang</th>
                                <th class="border p-1 text-center bg-red-50 text-red-700">Pemeliharaan</th>
                                <th class="border p-1 text-center bg-red-50 text-red-700">Kegiatan</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${monthlyData.map((m, i) => {
                                const penerimaan = m.bosReguler + m.bosAfirmasi + m.bosKinerja;
                                const pengeluaran = m.pegawai + m.barangJasa + m.pemeliharaan + m.kegiatanSiswa;

                                return `
                                <tr class="${i % 2 === 0 ? 'bg-gray-50' : ''}">
                                    <td class="border p-2 font-medium sticky left-0 ${i % 2 === 0 ? 'bg-gray-50' : 'bg-white'}">${m.bulan}</td>
                                    <td class="border p-2 text-right">${formatRupiah(m.bosReguler)}</td>

                                    <td class="border p-2 text-right">${formatRupiah(m.pemeliharaan)}</td>

function printLaporanSekolah(type) {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const siswa = DB.getSiswaBySekolah(DB.currentSekolahId);
    const gtk = DB.getGtkBySekolah(DB.currentSekolahId);
    
    showToast(`Mencetak laporan ${type}...`, 'info');
    setTimeout(() => {
        const printWin = window.open('', '', 'width=900,height=700');
        let content = `<html><head><title>Laporan ${type}</title><style>body{font-family:Arial,sans-serif;padding:30px;font-size:12px;}table{width:100%;border-collapse:collapse;margin:15px 0;}th,td{border:1px solid #333;padding:6px 8px;text-align:left;}th{background:#f0f0f0;}.header{text-align:center;border-bottom:3px double #333;padding-bottom:15px;margin-bottom:20px;}.logo{width:60px;height:60px;margin:0 auto 10px;}</style></head><body>`;
        content += `<div class="header"><img src="https://i.pinimg.com/1200x/76/39/2d/76392d91c9c22d8ec5563b1126cd55b8.jpg" class="logo"><h1>${sekolah.nama.toUpperCase()}</h1><h2>LAPORAN ${type.toUpperCase()}</h2><p>Tahun Ajaran 2024/2025</p></div>`;
        
        if (type === 'siswa') {
            content += `<table><tr><th>No</th><th>NIS</th><th>NISN</th><th>Nama</th><th>Kelas</th><th>JK</th><th>Status</th></tr>`;
            siswa.forEach((s,i) => { content += `<tr><td>${i+1}</td><td>${s.nis}</td><td>${s.nisn}</td><td>${s.nama}</td><td>${s.kelas}</td><td>${s.jk}</td><td>${s.status}</td></tr>`; });
            content += `</table>`;
        } else if (type === 'gtk') {
            content += `<table><tr><th>No</th><th>NIP</th><th>Nama</th><th>Jabatan</th><th>Mapel</th><th>Status</th></tr>`;
            gtk.forEach((g,i) => { content += `<tr><td>${i+1}</td><td>${g.nip}</td><td>${g.nama}</td><td>${g.jabatan}</td><td>${g.mapel}</td><td>${g.statusKepeg}</td></tr>`; });
            content += `</table>`;
        }
        
        content += `<br><div style="display:flex;justify-content:flex-end;"><div style="text-align:center;"><p>${sekolah.alamat}, ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</p><p>Kepala Sekolah</p><br><br><br><p><b><u>${sekolah.kepsek}</u></b></p></div></div>`;
        content += '</body></html>';
        printWin.document.write(content);
        printWin.document.close();
        printWin.print();
        showToast('Laporan berhasil dicetak!', 'success');
    }, 500);
}

function downloadTemplate(type) {
    // Create CSV content for download
    let csvContent = '';
    let filename = '';
    
    if (type === 'siswa') {
        csvContent = 'NIS,NISN,Nama Lengkap,Kelas,Jenis Kelamin,Tempat Lahir,Tanggal Lahir,Alamat,Nama Orang Tua,No. HP Orang Tua,Status\n';
        csvContent += '001,001000001,Contoh Siswa,I,L,Jakarta,2018-05-10,Jl. Contoh No. 1,Nama Ortu,081234567890,Aktif\n';
        filename = 'template_siswa.csv';
    } else if (type === 'gtk') {
        csvContent = 'NIP,Nama Lengkap,Jabatan,Mata Pelajaran,Pendidikan,Status Kepegawaian,Tempat Lahir,Tanggal Lahir,Alamat,No. Telepon,Email\n';
        csvContent += '198501012010011001,Contoh Guru,Guru,Matematika,S1,PNS,Jakarta,1985-01-01,Jl. Contoh No. 1,081234567890,email@contoh.com\n';
        filename = 'template_gtk.csv';
    } else if (type === 'sarpras') {
        csvContent = 'Jenis Sarana,Jumlah,Kondisi Baik,Kondisi Rusak Ringan,Kondisi Rusak Berat,Keterangan\n';
        csvContent += 'Ruang Kelas,12,12,0,0,Baik\n';
        csvContent += 'Komputer,25,23,2,0,-\n';
        filename = 'template_sarpras.csv';
    } else if (type === 'keuangan') {
        csvContent = 'Jenis,Uraian,Jumlah,Tanggal,Keterangan\n';
        csvContent += 'Penerimaan,Dana BOS Reguler,500000000,2025-01-15,Transfer\n';
        csvContent += 'Pengeluaran,Belanja Pegawai,175000000,2025-01-20,Gaji\n';
        filename = 'template_keuangan.csv';
    }
    
    // Create download
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    
    showToast(`Template ${type} berhasil diunduh!`);
}

function changePassword() {
    const oldPass = document.getElementById('oldPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const npsn = sekolah?.npsn || DB.currentUser;
    
    // Validasi password lama
    if (oldPass !== DB.passwords[npsn]) {
        showToast('Password lama tidak sesuai!', 'error');
        return;
    }
    
    // Validasi password baru
    if (newPass.length < 6) {
        showToast('Password baru minimal 6 karakter!', 'error');
        return;
    }
    
    if (newPass !== confirmPass) {
        showToast('Konfirmasi password tidak cocok!', 'error');
        return;
    }
    
    // Simpan password baru
    DB.passwords[npsn] = newPass;
    showToast('Password berhasil diubah!');
    
    // Kosongkan form
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
}

                            <th class="p-3 text-center">Jumlah Kuota</th>
                            <th class="p-3 text-center">Selisih</th>
                            <th class="p-3 text-center">Status</th>

                                <tr class="border-b border-gray-100 hover:bg-gray-50">
                                    <td class="p-3">${i+1}</td>
                                    <td class="p-3 font-medium">${escapeHtml(r.nama)}</td>
                                    <td class="p-3 text-center">${r.calon}</td>
                                    <td class="p-3 text-center">${r.kuota}</td>
                                    <td class="p-3 text-center ${r.selisih < 0 ? 'text-red-600' : r.selisih > 0 ? 'text-yellow-600' : 'text-green-600'}">${r.selisih}</td>
                                    <td class="p-3 text-center">

function renderPipUsulanRows(list) {
    if (list.length === 0) return '<tr><td colspan="9" class="p-8 text-center text-gray-500">Belum ada data calon penerima PIP</td></tr>';
    return list.map((c, i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="p-4">${i+1}</td>
            <td class="p-4">${escapeHtml(c.sekolah)}</td>
            <td class="p-4 font-mono">${c.nisn}</td>
            <td class="p-4 font-medium">${escapeHtml(c.nama)}</td>
            <td class="p-4 text-center">${c.kelas}</td>
            <td class="p-4 text-center"><span class="px-2 py-1 ${c.jk==='L'?'bg-blue-100 text-blue-700':'bg-pink-100 text-pink-700'} rounded-lg text-xs">${c.jk}</span></td>
            <td class="p-4">${escapeHtml(c.namaOrtu)}</td>
            <td class="p-4">${c.pekerjaanOrtu}</td>
            <td class="p-4 text-right">${formatRupiah(c.penghasilanOrtu)}</td>
        </tr>
    `).join('');
}

function filterPipUsulan() {
    const sekolahId = document.getElementById('filterSekolahPip').value;
    const filtered = [];
    DB.sekolahList.forEach(s => {
        if (!sekolahId || s.id == sekolahId) {
            const calonList = DB.pipCalon[s.id] || [];
            calonList.forEach(c => {
                filtered.push({ ...c, sekolahId: s.id, sekolah: s.nama });
            });
        }
    });
    document.getElementById('pipUsulanTbody').innerHTML = renderPipUsulanRows(filtered);
}

function downloadTemplatePip() {
    let csvContent = 'NISN,Nama Lengkap,Kelas,Jenis Kelamin (L/P),Nama Orang Tua,Pekerjaan Orang Tua,Penghasilan Orang Tua,Alamat\n';
    csvContent += '001000001,Contoh Siswa,I,L,Nama Ortu,Petani,800000,Jl. Contoh No. 1\n';
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'template_pip.csv';
    link.click();
    showToast('Template PIP berhasil diunduh!');
}

function handleUploadPip(input) {
    const file = input.files[0];
    if (!file) return;
    closeModal();
    showToast(`File "${file.name}" berhasil diupload! Data sedang diproses...`, 'info');
    setTimeout(() => {
        showToast('Data PIP berhasil diimport!', 'success');
        renderWPipUsulan();
    }, 1500);
}

function renderPipVervalRows(list) {
    if (list.length === 0) return '<tr><td colspan="9" class="p-8 text-center text-gray-500">Belum ada data verval PIP</td></tr>';
    return list.map((v, i) => `
        <tr class="border-b border-gray-100 hover:bg-gray-50 ${v.statusVerval === 'terverifikasi' ? 'bg-green-50' : ''}">
            <td class="p-4 text-center">
                <input type="checkbox" class="verval-checkbox w-4 h-4 rounded" data-id="${v.id}" ${v.statusVerval === 'terverifikasi' ? 'checked disabled' : ''} onchange="updateVervalSelection()">
            </td>
            <td class="p-4">${i+1}</td>
            <td class="p-4">${escapeHtml(v.sekolah)}</td>
            <td class="p-4 font-mono">${v.nisn}</td>
            <td class="p-4 font-medium">${escapeHtml(v.nama)}</td>
            <td class="p-4 text-center">${v.kelas}</td>
            <td class="p-4 text-center">
                <span class="px-2 py-1 ${v.statusVerval === 'terverifikasi' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'} rounded-lg text-xs">${v.statusVerval === 'terverifikasi' ? 'Terverifikasi' : 'Menunggu'}</span>
            </td>
            <td class="p-4 text-center">${v.tanggalVerval}</td>
            <td class="p-4 text-center">
                <button onclick="verifikasiPip(${v.id})" class="text-green-500 hover:text-green-700 mr-2" title="Verifikasi" ${v.statusVerval === 'terverifikasi' ? 'disabled class="opacity-50 cursor-not-allowed"' : ''}><i class="fas fa-check-circle"></i></button>
                <button onclick="showDetailPipVerval(${v.id})" class="text-blue-500 hover:text-blue-700" title="Detail"><i class="fas fa-eye"></i></button>
            </td>
        </tr>
    `).join('');
}

function filterPipVerval() {
    const sekolahId = document.getElementById('filterSekolahVerval').value;
    const status = document.getElementById('filterStatusVerval').value;
    let filtered = DB.pipVerval;
    if (sekolahId) filtered = filtered.filter(v => v.sekolahId == sekolahId);
    if (status === 'menunggu') filtered = filtered.filter(v => v.statusVerval !== 'terverifikasi');
    if (status === 'terverifikasi') filtered = filtered.filter(v => v.statusVerval === 'terverifikasi');
    document.getElementById('pipVervalTbody').innerHTML = renderPipVervalRows(filtered);
    updateVervalSelection();
}

function toggleAllVervalCheckbox() {
    const checkAll = document.getElementById('checkAllVerval');
    const checkboxes = document.querySelectorAll('.verval-checkbox:not(:disabled)');
    checkboxes.forEach(cb => { cb.checked = checkAll.checked; });
    updateVervalSelection();
}

function updateVervalSelection() {
    const checkboxes = document.querySelectorAll('.verval-checkbox:checked:not(:disabled)');
    const count = checkboxes.length;
    const btn = document.getElementById('btnVerifikasiSelected');
    const countSpan = document.getElementById('selectedVervalCount');
    
    if (count > 0) {
        btn.classList.remove('hidden');
        countSpan.textContent = count;
    } else {
        btn.classList.add('hidden');
    }
}

function verifikasiSelectedPip() {
    const checkboxes = document.querySelectorAll('.verval-checkbox:checked:not(:disabled)');
    const ids = Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
    
    if (ids.length === 0) {
        showToast('Pilih data yang akan diverifikasi!', 'warning');
        return;
    }
    
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-check-double text-green-600 text-2xl"></i></div>
                <h3 class="text-lg font-semibold">Verifikasi Data PIP</h3>
                <p class="text-sm text-gray-500 mt-1">${ids.length} data akan diverifikasi</p>
            </div>
            <div class="flex gap-3">
                <button onclick="doVerifikasiSelectedPip([${ids}])" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2.5 rounded-xl text-sm font-medium">Verifikasi</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

function doVerifikasiSelectedPip(ids) {
    const today = new Date().toISOString().split('T')[0];
    ids.forEach(id => {
        const v = DB.pipVerval.find(x => x.id === id);
        if (v && v.statusVerval !== 'terverifikasi') {
            v.statusVerval = 'terverifikasi';
            v.tanggalVerval = today;
        }
    });
    
    closeModal();
    showToast(`${ids.length} data berhasil diverifikasi!`);
    renderWPipVerval();
}

function verifikasiPip(id) {
    const v = DB.pipVerval.find(x => x.id === id);
    if (v) {
        v.statusVerval = 'terverifikasi';
        v.tanggalVerval = new Date().toISOString().split('T')[0];
        showToast('Data PIP berhasil diverifikasi!');
        renderWPipVerval();
    }
}

            </div>
            <button onclick="closeModal()" class="w-full mt-4 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Tutup</button>

function downloadRekapUsulanPip() {
    let csvContent = 'No,Sekolah,NISN,Nama,Kelas,Status Verval,Tanggal Verval\n';
    DB.pipVerval.forEach((v, i) => {
        csvContent += `${i+1},"${v.sekolah}",${v.nisn},"${v.nama}",${v.kelas},${v.statusVerval},${v.tanggalVerval}\n`;
    });
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'rekap_usulan_pip.csv';
    link.click();
    showToast('Rekap usulan PIP berhasil diunduh!');
}

function downloadPemberkasanPip() {
    let csvContent = 'No,Sekolah,NISN,Nama,Status Berkas,Tanggal Berkas,Bukti Bank\n';
    DB.pipPemberkasan.forEach((p, i) => {
        csvContent += `${i+1},"${p.sekolah}",${p.nisn},"${p.nama}",${p.statusBerkas},${p.tanggalBerkas},${p.buktiBank || '-'}\n`;
    });
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'pemberkasan_pip.csv';
    link.click();
    showToast('Data pemberkasan PIP berhasil diunduh!');
}

function toggleSelectAllPip() {
    const checkAll = document.getElementById('checkAllPip');
    const checkboxes = document.querySelectorAll('.pip-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = checkAll.checked;
        const id = parseInt(cb.dataset.id);
        const calon = DB.pipCalon[DB.currentSekolahId];
        if (calon) {
            const item = calon.find(c => c.id === id);
            if (item) item.selected = checkAll.checked;
        }
    });
}

function togglePipSelection(id) {
    const calon = DB.pipCalon[DB.currentSekolahId];
    if (calon) {
        const item = calon.find(c => c.id === id);
        if (item) item.selected = !item.selected;
    }
}

function submitUsulanPip() {
    const calon = DB.pipCalon[DB.currentSekolahId] || [];
    const selected = calon.filter(c => c.selected);
    const kuota = DB.getKuotaPIP(DB.currentSekolahId);
    const usulanSekarang = (DB.pipUsulan[DB.currentSekolahId] || []).length;
    
    if (selected.length === 0) {
        showToast('Pilih minimal satu calon penerima!', 'warning');
        return;
    }
    
    if (usulanSekarang + selected.length > kuota) {
        showToast(`Jumlah usulan melebihi kuota! Kuota: ${kuota}, Usulan: ${usulanSekarang}, Dipilih: ${selected.length}`, 'error');
        return;
    }
    
    // Add to usulan
    if (!DB.pipUsulan[DB.currentSekolahId]) DB.pipUsulan[DB.currentSekolahId] = [];
    selected.forEach(s => {
        const newId = DB.pipUsulan[DB.currentSekolahId].length > 0 ? Math.max(...DB.pipUsulan[DB.currentSekolahId].map(u => u.id)) + 1 : 1;
        DB.pipUsulan[DB.currentSekolahId].push({
            id: newId,
            nisn: s.nisn,
            nama: s.nama,
            kelas: s.kelas,
            jk: s.jk,
            namaOrtu: s.namaOrtu,
            pekerjaanOrtu: s.pekerjaanOrtu,
            penghasilanOrtu: s.penghasilanOrtu,
            statusUsulan: 'diajukan',
            tanggalUsul: new Date().toISOString().split('T')[0]
        });
        // Mark as diajukan in calon
        s.status = 'diajukan';
        s.selected = false;
    });
    
    showToast(`${selected.length} calon berhasil diajukan!`);
    renderSPipVerval();
}

function kirimUsulanPip() {
    const kuota = DB.getKuotaPIP(DB.currentSekolahId);
    const usulan = DB.getUsulanPIPBySekolah(DB.currentSekolahId);
    
    if (usulan.length !== kuota) {
        showToast(`Jumlah usulan (${usulan.length}) harus sama dengan kuota (${kuota})!`, 'error');
        return;
    }
    
    // Add to pipVerval (Admin Wilayah)
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    usulan.forEach(u => {
        const newId = DB.pipVerval.length > 0 ? Math.max(...DB.pipVerval.map(v => v.id)) + 1 : 1;
        DB.pipVerval.push({
            id: newId,
            sekolahId: DB.currentSekolahId,
            sekolah: sekolah?.nama || '',
            nisn: u.nisn,
            nama: u.nama,
            kelas: u.kelas,
            statusVerval: 'menunggu',
            tanggalVerval: '-'
        });
    });
    
    showToast('Usulan PIP berhasil dikirim ke Admin Wilayah!', 'success');
    renderSPipVerval();
}

function previewBuktiBank(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        document.getElementById('previewBukti').classList.remove('hidden');
        document.getElementById('previewBukti').innerHTML = `<i class="fas fa-file mr-1"></i>${file.name}`;
    }
}

function submitPemberkasanPip() {
    const tanggal = document.getElementById('pbTanggal').value;
    const buktiInput = document.getElementById('pbBukti');
    
    if (!tanggal) {
        showToast('Lengkapi tanggal pemberkasan!', 'error');
        return;
    }
    
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const vervalTerverifikasi = DB.pipVerval.filter(v => v.sekolahId === DB.currentSekolahId && v.statusVerval === 'terverifikasi');
    const jumlahSiswa = vervalTerverifikasi.length;
    const newId = DB.pipPemberkasan.length > 0 ? Math.max(...DB.pipPemberkasan.map(p => p.id)) + 1 : 1;
    
    DB.pipPemberkasan.push({
        id: newId,
        sekolahId: DB.currentSekolahId,
        sekolah: sekolah?.nama || '',
        jumlahSiswa: jumlahSiswa,
        statusBerkas: 'lengkap',
        tanggalBerkas: tanggal,
        buktiBank: buktiInput.files[0]?.name || 'bukti_transfer.pdf'
    });
    
    showToast('Pemberkasan berhasil disubmit!');
    document.getElementById('pbTanggal').value = new Date().toISOString().split('T')[0];
    buktiInput.value = '';
    document.getElementById('previewBukti').classList.add('hidden');
    renderSPipPemberkasan();
}

function submitAllPemberkasanPip() {
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    const vervalTerverifikasi = DB.pipVerval.filter(v => v.sekolahId === DB.currentSekolahId && v.statusVerval === 'terverifikasi');
    const existing = DB.pipPemberkasan.filter(p => p.sekolahId === DB.currentSekolahId);
    
    if (existing.length > 0) {
        showToast('Pemberkasan sudah pernah disubmit!', 'warning');
        return;
    }
    
    if (vervalTerverifikasi.length === 0) {
        showToast('Tidak ada siswa terverifikasi!', 'info');
        return;
    }
    
    showModal(`

    let newId = DB.pipPemberkasan.length > 0 ? Math.max(...DB.pipPemberkasan.map(p => p.id)) + 1 : 1;

    DB.pipPemberkasan.push({

        sekolah: sekolah?.nama || '',
        jumlahSiswa: vervalTerverifikasi.length,
        statusBerkas: 'lengkap',
        tanggalBerkas: today,
        buktiBank: 'bukti_transfer_default.pdf'
    });
    
    closeModal();
    showToast('Pemberkasan berhasil disubmit!');
    renderSPipPemberkasan();
}

function downloadRekapPemberkasanPip() {
    const pemberkasan = DB.pipPemberkasan.filter(p => p.sekolahId === DB.currentSekolahId);
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);
    
    let csvContent = 'Rekap Pemberkasan PIP\n';
    csvContent += `Sekolah: ${sekolah?.nama || ''}\n`;
    csvContent += `Tanggal: ${new Date().toLocaleDateString('id-ID')}\n\n`;
    csvContent += 'No,Nama Sekolah,Jumlah Siswa,Status Berkas,Tanggal Pemberkasan\n';
    
    pemberkasan.forEach((p, i) => {
        csvContent += `${i+1},"${p.sekolah}",${p.jumlahSiswa},${p.statusBerkas},${p.tanggalBerkas}\n`;
    });
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `rekap_pemberkasan_pip_${sekolah?.npsn || 'sekolah'}.csv`;
    link.click();
    
    showToast('Rekap pemberkasan berhasil diunduh!');
}

function editPemberkasanPip(id) {
    const p = DB.pipPemberkasan.find(x => x.id === id);
    if (!p) return;
    
    const sekolah = DB.sekolahList.find(s => s.id === DB.currentSekolahId);

                    <input type="text" value="${escapeHtml(p.sekolah || sekolah?.nama || '')}" class="w-full border rounded-xl px-4 py-2.5 text-sm bg-gray-100" readonly>

                    </div>
                    <div>
                        <label class="text-sm text-gray-600 mb-1 block">Tanggal Pemberkasan</label>

                <div>
                    <label class="text-sm text-gray-600 mb-1 block">Status Berkas</label>

            <div class="flex gap-3 mt-6">

function doEditPemberkasanPip(id) {
    const p = DB.pipPemberkasan.find(x => x.id === id);
    if (!p) return;
    
    p.tanggalBerkas = document.getElementById('editPbTanggal').value;
    p.statusBerkas = document.getElementById('editPbStatus').value;
    
    closeModal();
    showToast('Pemberkasan berhasil diupdate!');
    renderSPipPemberkasan();
}

function hapusPemberkasanPip(id) {
    const p = DB.pipPemberkasan.find(x => x.id === id);
    if (!p) return;
    
    showModal(`
        <div class="p-6">
            <div class="text-center mb-4">
                <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-trash text-red-600 text-2xl"></i></div>
                <h3 class="text-lg font-semibold">Hapus Pemberkasan</h3>
                <p class="text-sm text-gray-500 mt-1">${escapeHtml(p.sekolah)} - ${p.jumlahSiswa || 0} siswa</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
                <p class="text-sm text-red-700">Data pemberkasan akan dihapus permanen dan tidak dapat dikembalikan.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="doHapusPemberkasanPip(${id})" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-xl text-sm font-medium">Hapus</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium">Batal</button>
            </div>
        </div>
    `);
}

function doHapusPemberkasanPip(id) {
    const idx = DB.pipPemberkasan.findIndex(p => p.id === id);
    if (idx > -1) {
        DB.pipPemberkasan.splice(idx, 1);
        closeModal();
        showToast('Pemberkasan berhasil dihapus!');
        renderSPipPemberkasan();
    }
}
